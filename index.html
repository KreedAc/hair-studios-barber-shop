                <p style={{fontSize:11,fontWeight:600,color:'var(--ink3)',marginBottom:4,textTransform:'uppercase',letterSpacing:0.3}}>Guadagno (€)</p>
                <input type="number" min="0" step="0.5" value={editEarnings} onChange={e=>setEditEarnings(e.target.value)}
                  placeholder="0"
                  style={{width:'100%',background:'var(--bg2)',border:'1.5px solid var(--border)',borderRadius:'var(--radius-sm)',
                    padding:'10px 12px',fontSize:14,color:'var(--ink)',outline:'none',fontFamily:"'Jost',sans-serif"}} />
              </div>
              {/* Note */}
              <div>
                <p style={{fontSize:11,fontWeight:600,color:'var(--ink3)',marginBottom:4,textTransform:'uppercase',letterSpacing:0.3}}>Note interne</p>
                <textarea value={editNotes} onChange={e=>setEditNotes(e.target.value)}
                  placeholder="Allergie, preferenze, richieste speciali…"
                  rows={3}
                  style={{width:'100%',background:'var(--bg2)',border:'1.5px solid var(--border)',borderRadius:'var(--radius-sm)',
                    padding:'10px 12px',fontSize:14,color:'var(--ink)',fontFamily:"'Jost',sans-serif",
                    resize:'none',outline:'none',lineHeight:1.5}} />
              </div>
              <button onClick={saveEdit} disabled={busy}
                style={{width:'100%',padding:14,borderRadius:'var(--radius-sm)',background:'var(--ink)',color:'white',
                  fontSize:14,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",border:'none',marginBottom:8}}>
                {busy ? 'Salvataggio…' : '✓ Salva modifiche'}
              </button>
            </div>
          </div>
        )}

        {mode==='reschedule'&&(
          <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
              <button className="btn-icon" onClick={()=>setMode('menu')}>←</button>
              <h3 style={{fontSize:17,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)'}}>Sposta appuntamento</h3>
            </div>
            <div style={{display:'flex',gap:8,marginBottom:14}}>
              {staff.map(s=>(
                <button key={s.id} onClick={()=>{setNewStaff(s.id);setNewTime(null);}}
                  style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'10px 8px',borderRadius:12,border:'1.5px solid',
                    borderColor:newStaff===s.id?'var(--ink)':'var(--border)',background:newStaff===s.id?'var(--ink)':'var(--bg2)'}}>
                  <div className="avatar" style={{width:32,height:32,fontSize:11,background:s.color,color:'white',fontWeight:700}}>{s.initials}</div>
                  <p style={{fontSize:11,fontWeight:600,color:newStaff===s.id?'white':'var(--ink)'}}>{s.name.split(' ')[0]}</p>
                </button>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <button className="btn-icon" style={{width:32,height:32,fontSize:14}} onClick={()=>setWeekOffset(o=>Math.max(0,o-1))} disabled={weekOffset===0}>‹</button>
              <div style={{position:'relative'}}>
                <button onClick={()=>setShowPicker(p=>!p)}
                  style={{fontSize:12,fontWeight:600,color:'var(--ink)',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'4px 10px',cursor:'pointer'}}>
                  {MONTHS[weekDates[0].getMonth()]} {weekDates[0].getFullYear()} ▾
                </button>
                {showPicker && <MonthYearPicker weekDates={weekDates} setWeekOffset={setWeekOffset} onClose={()=>setShowPicker(false)} />}
              </div>
              <button className="btn-icon" style={{width:32,height:32,fontSize:14}} onClick={()=>setWeekOffset(o=>o+1)}>›</button>
            </div>
            <div style={{display:'flex',gap:4,marginBottom:12,overflowX:'auto'}}>
              {weekDates.map((d,i)=>{
                const today=new Date(); today.setHours(0,0,0,0);
                const isPast=d<today;
                const isClosed=!(schedules[newStaff]||{})[d.getDay()];
                const disabled=isPast||isClosed;
                const isSel=selectedDay===i&&!disabled;
                return(
                  <button key={i} disabled={disabled} onClick={()=>{if(!disabled){setSelectedDay(i);setNewTime(null);}}}
                    style={{flex:1,minWidth:36,padding:'6px 2px',borderRadius:8,border:'1.5px solid',textAlign:'center',
                      background:isSel?'var(--ink)':'var(--bg2)',borderColor:isSel?'var(--ink)':'var(--border)',
                      opacity:disabled?0.3:1,cursor:disabled?'not-allowed':'pointer'}}>
                    <p style={{fontSize:9,fontWeight:600,color:isSel?'rgba(255,255,255,0.6)':'var(--ink3)',textTransform:'uppercase'}}>{DAYS_SHORT[i]}</p>
                    <p style={{fontSize:14,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:isSel?'white':'var(--ink)'}}>{d.getDate()}</p>
                  </button>
                );
              })}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,overflowY:'auto',flex:1,paddingBottom:4}}>
              {HOURS.map(h=>{
                const dStr=toLocalDate(weekDates[selectedDay]);
                const now=new Date();
                const isToday=weekDates[selectedDay].toDateString()===now.toDateString();
                const [hh,mm]=h.split(':').map(Number);
                const isPastTime=isToday&&(hh*60+mm)<=(now.getHours()*60+now.getMinutes());
                const avail=!isPastTime&&checkSlot(dStr,h,newStaff,booking.service_duration,bookings.filter(b=>b.id!==booking.id),schedules,dayBlocks,dayOverrides);
                const disabled=!avail;
                const sel=newTime===h;
                return(
                  <button key={h} disabled={disabled} onClick={()=>!disabled&&setNewTime(h)}
                    style={{padding:'10px 4px',borderRadius:8,border:'1.5px solid',textAlign:'center',fontSize:15,fontWeight:600,fontFamily:"'Cormorant Garamond',serif",
                      background:sel?'var(--ink)':!disabled?'oklch(93% 0.07 145)':'oklch(94% 0.04 15)',
                      color:sel?'white':!disabled?'oklch(32% 0.14 145)':'oklch(45% 0.1 15)',
                      borderColor:sel?'var(--ink)':!disabled?'oklch(76% 0.11 145)':'oklch(82% 0.07 15)',
                      cursor:disabled?'not-allowed':'pointer'}}>
                    {h}
                  </button>
                );
              })}
            </div>
            <button className="btn-primary" style={{marginTop:14,opacity:newTime&&!busy?1:0.4}} disabled={!newTime||busy} onClick={confirmReschedule}>
              {busy?'Salvataggio...':'Conferma spostamento'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ADMIN MANUAL BOOKING ────────────────────────────────────────
function AdminManualBooking({ staff, services, bookings, onBooked, setToast, onClose, schedules, dayBlocks, dayOverrides }) {
  const [step, setStep]           = useState(0);
  const [clientName, setClientName] = useState('');
  const [clientPhone, setClientPhone] = useState('');
  const [clientNotes, setClientNotes] = useState('');
  const [selectedServices, setSel] = useState([]);
  const [selectedStaff, setSelectedStaff] = useState(null);
  const [date, setDate]           = useState(null);
  const [time, setTime]           = useState(null);
  const [weekOffset, setWeekOffset] = useState(0);
  const [selectedDay, setSelectedDay] = useState(0);
  const [showPicker, setShowPicker] = useState(false);
  const [busy, setBusy]           = useState(false);
  const weekDates = getWeekDates(weekOffset);
  const totalDuration = selectedServices.reduce((a,s)=>a+s.duration, 0);

  const toggleService = (s) => {
    setSel(prev => prev.find(p=>p.id===s.id) ? prev.filter(p=>p.id!==s.id) : [...prev,s]);
    setTime(null); setDate(null);
  };

  const SLOTS = [];
  for(let h=8;h<20;h++){ SLOTS.push(`${String(h).padStart(2,'0')}:00`); SLOTS.push(`${String(h).padStart(2,'0')}:30`); }

  const confirm = async () => {
    if (!clientName.trim()||!selectedStaff||!date||!time||!selectedServices.length) return;
    setBusy(true);
    const { error } = await supabase.from('bookings').insert({
      user_id:          null,
      staff_id:         selectedStaff.id,
      service_id:       selectedServices.length===1 ? selectedServices[0].id : null,
      service_name:     selectedServices.map(s=>s.name).join(' + '),
      service_duration: totalDuration,
      client_name:      clientName.trim(),
      client_phone:     clientPhone.trim()||null,
      notes:            clientNotes.trim()||null,
      date, time,
      status: 'confirmed',
    });
    setBusy(false);
    if (error) { setToast('Errore: '+error.message); return; }
    setToast('✓ Appuntamento inserito');
    onBooked();
    onClose();
  };

  const steps = ['Cliente','Servizi','Barbiere','Data & Ora'];
  return (
    <div className="screen">
      <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
          <button className="btn-icon" onClick={step===0?onClose:()=>setStep(s=>s-1)}>←</button>
          <div style={{flex:1}}>
            <h2 style={{fontSize:20,fontWeight:700,color:'var(--ink)',letterSpacing:-0.3}}>{steps[step]}</h2>
          </div>
        </div>
        <div className="step-indicator" style={{marginBottom:16}}>
          {steps.map((_,i)=><div key={i} className={`step-dot ${i===step?'active':i<step?'done':''}`}></div>)}
        </div>
      </div>

      <div className="scroll-content" style={{padding:'0 24px 100px'}}>

        {/* STEP 0: Cliente */}
        {step===0&&(
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div className="input-group">
              <label className="input-label">Nome cliente *</label>
              <input className="input-field" placeholder="Mario Rossi" value={clientName} onChange={e=>setClientName(e.target.value)} />
            </div>
            <div className="input-group">
              <label className="input-label">Telefono <span style={{color:'var(--ink3)',fontWeight:400}}>(opzionale)</span></label>
              <input className="input-field" type="tel" placeholder="+39 345 000 0000" value={clientPhone} onChange={e=>setClientPhone(e.target.value)} />
            </div>
            <div className="input-group">
              <label className="input-label">Note <span style={{color:'var(--ink3)',fontWeight:400}}>(opzionale)</span></label>
              <textarea className="input-field" rows={3} placeholder="Allergie, preferenze, richieste speciali…"
                value={clientNotes} onChange={e=>setClientNotes(e.target.value)}
                style={{resize:'none',lineHeight:1.5,fontFamily:"'Jost',sans-serif"}} />
            </div>
            <button className="btn-primary" style={{marginTop:8,opacity:clientName.trim()?1:0.4}} disabled={!clientName.trim()} onClick={()=>setStep(1)}>Continua →</button>
          </div>
        )}

        {/* STEP 1: Servizi */}
        {step===1&&(
          <>
            <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
              {services.map(s=>{
                const isSel=selectedServices.find(p=>p.id===s.id);
                return(
                  <button key={s.id} onClick={()=>toggleService(s)}
                    style={{display:'flex',alignItems:'center',gap:14,padding:'16px 18px',
                      background:isSel?'var(--ink)':'var(--bg)',borderRadius:'var(--radius-sm)',
                      border:'1.5px solid',borderColor:isSel?'var(--ink)':'var(--border)',textAlign:'left',width:'100%'}}>
                    <div style={{width:22,height:22,borderRadius:6,border:'2px solid',
                      borderColor:isSel?'var(--gold)':'rgba(0,0,0,0.2)',background:isSel?'var(--gold)':'transparent',
                      display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      {isSel&&<span style={{color:'white',fontSize:13,fontWeight:700}}>✓</span>}
                    </div>
                    <div style={{flex:1}}>
                      <p style={{fontSize:15,fontWeight:600,fontFamily:"'Cormorant Garamond',serif",color:isSel?'white':'var(--ink)'}}>{s.name}</p>
                      <p style={{fontSize:12,color:isSel?'rgba(255,255,255,0.55)':'var(--ink3)',marginTop:2}}>{s.duration} min{s.price?` · €${Number(s.price).toFixed(2)}`:''}</p>
                    </div>
                  </button>
                );
              })}
            </div>
            <button className="btn-primary" style={{opacity:selectedServices.length?1:0.4}} disabled={!selectedServices.length} onClick={()=>setStep(2)}>Continua →</button>
          </>
        )}

        {/* STEP 2: Barbiere */}
        {step===2&&(
          <>
            <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:24}}>
              {staff.map(s=>(
                <button key={s.id} onClick={()=>{setSelectedStaff(s);setTime(null);setDate(null);}}
                  style={{display:'flex',alignItems:'center',gap:16,padding:'18px',borderRadius:'var(--radius)',
                    background:selectedStaff?.id===s.id?'var(--ink)':'var(--bg)',
                    border:'1.5px solid',borderColor:selectedStaff?.id===s.id?'var(--ink)':'var(--border)',
                    textAlign:'left',width:'100%'}}>
                  <div className="avatar" style={{width:52,height:52,fontSize:18,background:s.color,color:'white',fontWeight:700}}>{s.initials}</div>
                  <div style={{flex:1}}>
                    <p style={{fontSize:16,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:selectedStaff?.id===s.id?'white':'var(--ink)'}}>{s.name}</p>
                    <p style={{fontSize:12,color:selectedStaff?.id===s.id?'rgba(255,255,255,0.6)':'var(--ink3)',marginTop:2}}>{s.role}</p>
                  </div>
                  {selectedStaff?.id===s.id&&<span style={{color:'var(--gold)',fontSize:20}}>✓</span>}
                </button>
              ))}
            </div>
            <button className="btn-primary" style={{opacity:selectedStaff?1:0.4}} disabled={!selectedStaff} onClick={()=>setStep(3)}>Continua →</button>
          </>
        )}

        {/* STEP 3: Data & Ora */}
        {step===3&&selectedStaff&&(
          <>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <button className="btn-icon" onClick={()=>setWeekOffset(o=>Math.max(0,o-1))} style={{opacity:weekOffset===0?0.3:1}}>‹</button>
              <div style={{position:'relative'}}>
                <button onClick={()=>setShowPicker(p=>!p)}
                  style={{fontSize:13,fontWeight:600,color:'var(--ink)',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'5px 12px',cursor:'pointer'}}>
                  {MONTHS[weekDates[0].getMonth()]} {weekDates[0].getFullYear()} ▾
                </button>
                {showPicker && <MonthYearPicker weekDates={weekDates} setWeekOffset={setWeekOffset} onClose={()=>setShowPicker(false)} onSelect={()=>{setTime(null);setDate(null);}} />}
              </div>
              <button className="btn-icon" onClick={()=>setWeekOffset(o=>o+1)}>›</button>
            </div>
            <div style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
              {weekDates.map((d,i)=>{
                const today=new Date(); today.setHours(0,0,0,0);
                const isPast=d<today;
                const isClosed=selectedStaff&&!(schedules[selectedStaff.id]||{})[d.getDay()];
                const disabled=isPast||isClosed;
                const isSel=selectedDay===i&&!disabled;
                const isToday=d.toDateString()===new Date().toDateString();
                return(
                  <button key={i} disabled={disabled} onClick={()=>{if(!disabled){setSelectedDay(i);setTime(null);setDate(null);}}}
                    style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'10px 12px',
                      borderRadius:12,border:'1.5px solid',flexShrink:0,minWidth:46,
                      borderColor:isSel?'var(--ink)':isToday&&!disabled?'var(--gold-dim)':'var(--border)',
                      background:isSel?'var(--ink)':isToday&&!disabled?'var(--gold-bg)':'var(--bg)',
                      opacity:disabled?0.3:1,cursor:disabled?'not-allowed':'pointer'}}>
                    <span style={{fontSize:10,fontWeight:600,color:isSel?'rgba(255,255,255,0.6)':isToday&&!disabled?'var(--gold)':'var(--ink3)',textTransform:'uppercase',letterSpacing:0.3}}>{DAYS_SHORT[i]}</span>
                    <span style={{fontSize:18,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:isSel?'white':'var(--ink)'}}>{d.getDate()}</span>
                  </button>
                );
              })}
            </div>
            <p style={{fontSize:12,fontWeight:600,color:'var(--ink2)',marginBottom:10,textTransform:'uppercase',letterSpacing:0.5}}>Orari disponibili</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:24}}>
              {SLOTS.map(h=>{
                const dStr=toLocalDate(weekDates[selectedDay]);
                const avail=checkSlot(dStr,h,selectedStaff.id,totalDuration,bookings,schedules,dayBlocks,dayOverrides);
                const isSel=time===h&&date===dStr;
                return(
                  <button key={h} disabled={!avail} onClick={()=>{setTime(h);setDate(dStr);}}
                    style={{padding:'12px 8px',borderRadius:10,border:'1.5px solid',textAlign:'center',
                      fontSize:15,fontWeight:600,fontFamily:"'Cormorant Garamond',serif",
                      background:isSel?'var(--ink)':avail?'oklch(93% 0.07 145)':'oklch(94% 0.04 15)',
                      color:isSel?'white':avail?'oklch(32% 0.14 145)':'oklch(45% 0.1 15)',
                      borderColor:isSel?'var(--ink)':avail?'oklch(76% 0.11 145)':'oklch(82% 0.07 15)',
                      cursor:!avail?'not-allowed':'pointer',transition:'all 0.15s'}}>
                    {h}
                  </button>
                );
              })}
            </div>
            <button className="btn-primary" style={{opacity:date&&time&&!busy?1:0.4}} disabled={!date||!time||busy} onClick={confirm}>
              {busy?'Salvataggio...':'✓ Inserisci appuntamento'}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ── ADMIN DASHBOARD ─────────────────────────────────────────────
function AdminDash({ bookings, onRefresh, setToast, staff, services, schedules, dayBlocks, dayOverrides, profile }) {
  const today    = TODAY();
  const myStaff  = profile?.staff_id || null;  // null = super admin, valorizzato = subadmin
  const myBks    = myStaff ? bookings.filter(b=>b.staff_id===myStaff) : bookings;
  const todayBks = myBks.filter(b=>b.date===today&&b.status!=='cancelled');
  const pending  = myBks.filter(b=>b.status==='pending');
  const confirmed= myBks.filter(b=>b.status==='confirmed'&&b.date>=today).length;
  const myStaffObj = myStaff ? staff.find(s=>s.id===myStaff) : null;
  const [activeBooking, setActiveBooking] = useState(null);
  const [manualBooking, setManualBooking] = useState(false);

  if (manualBooking) return (
    <AdminManualBooking
      staff={staff} services={services} bookings={bookings}
      onBooked={onRefresh} setToast={setToast}
      onClose={()=>setManualBooking(false)}
      schedules={schedules} dayBlocks={dayBlocks} dayOverrides={dayOverrides}
    />
  );

  const accept = async (id) => {
    await supabase.from('bookings').update({status:'confirmed'}).eq('id',id);
    setToast('✓ Prenotazione accettata'); onRefresh();
  };
  const reject = async (id) => {
    await supabase.from('bookings').update({status:'cancelled'}).eq('id',id);
    setToast('Prenotazione rifiutata'); onRefresh();
  };

  return (
    <div className="screen">
      <div className="scroll-content" style={{padding:'env(safe-area-inset-top,16px) 24px 24px',paddingTop:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:24}}>
          <div>
            <p style={{fontSize:12,color:'var(--ink3)',fontWeight:500}}>Dashboard</p>
            <h2 style={{fontSize:22,fontWeight:700,color:'var(--ink)',letterSpacing:-0.3}}>{myStaffObj ? `Ciao, ${myStaffObj.name.split(' ')[0]}` : 'Gestione Salone'}</h2>
          </div>
          <button onClick={()=>setManualBooking(true)}
            style={{display:'flex',alignItems:'center',gap:6,padding:'10px 16px',borderRadius:'var(--radius-sm)',
              background:'var(--ink)',color:'white',fontSize:13,fontWeight:700,border:'none',flexShrink:0,marginTop:4}}>
            <span style={{fontSize:16,lineHeight:1}}>+</span> Nuovo
          </button>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:24}}>
          {[
            {label:'Oggi',      value:todayBks.length,  alert:false},
            {label:'In attesa', value:pending.length,    alert:pending.length>0},
            {label:'Confermate',value:confirmed,         alert:false},
          ].map(s=>(
            <div key={s.label} style={{background:s.alert?'var(--gold-bg)':'var(--bg2)',border:`1px solid ${s.alert?'var(--gold-dim)':'var(--border)'}`,borderRadius:'var(--radius-sm)',padding:'14px 10px',textAlign:'center'}}>
              <p style={{fontSize:22,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:s.alert?'var(--gold)':'var(--ink)'}}>{s.value}</p>
              <p style={{fontSize:9,color:'var(--ink3)',marginTop:3,fontWeight:500,textTransform:'uppercase',letterSpacing:0.3}}>{s.label}</p>
            </div>
          ))}
        </div>

        {pending.length>0&&(
          <>
            <div className="section-header">
              <span className="section-title">Da confermare</span>
              <span className="badge badge-gold">{pending.length}</span>
            </div>
            {pending.map(b=>{
              const s=staff.find(st=>st.id===b.staff_id);
              return(
                <div key={b.id} className="card" style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                    <div>
                      <p style={{fontSize:14,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)'}}>{b.client_name}</p>
                      <p style={{fontSize:12,color:'var(--ink3)',marginTop:2}}>{b.service_name} · {b.time?.slice(0,5)}</p>
                      <p style={{fontSize:11,color:'var(--ink3)'}}>{new Date(b.date).toLocaleDateString('it-IT',{day:'numeric',month:'long'})} con {s?.name}</p>
                    </div>
                    <span style={{fontSize:12,color:'var(--ink3)'}}>{b.service_duration} min</span>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button onClick={()=>reject(b.id)} style={{flex:1,padding:10,borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontWeight:600,color:'var(--ink2)',background:'var(--bg)'}}>Rifiuta</button>
                    <button onClick={()=>setActiveBooking(b)} style={{flex:1,padding:10,borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontWeight:600,color:'var(--ink2)',background:'var(--bg)'}}>Sposta</button>
                    <button onClick={()=>accept(b.id)} style={{flex:2,padding:10,borderRadius:8,fontSize:13,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'white',background:'var(--ink)'}}>✓ Accetta</button>
                  </div>
                </div>
              );
            })}
            <div className="divider"></div>
          </>
        )}

        <div className="section-header">
          <span className="section-title">Oggi, {new Date().toLocaleDateString('it-IT',{day:'numeric',month:'long'})}</span>
        </div>
        <div style={{overflowY:'auto',maxHeight:'50vh',borderRadius:'var(--radius-sm)'}}>
        {todayBks.length===0
          ? <p style={{fontSize:13,color:'var(--ink3)',textAlign:'center',padding:'20px 0'}}>Nessun appuntamento oggi</p>
          : todayBks.sort((a,b)=>(a.time||'00:00').localeCompare(b.time||'00:00')).map(b=>{
            const s=staff.find(st=>st.id===b.staff_id);
            return(
              <div key={b.id} style={{display:'flex',gap:12,alignItems:'center',padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{width:44,textAlign:'right',flexShrink:0}}>
                  <p style={{fontSize:13,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)'}}>{b.time?.slice(0,5)}</p>
                </div>
                <div style={{width:3,alignSelf:'stretch',background:s?.color||'var(--ink)',borderRadius:99,flexShrink:0}}></div>
                <div style={{flex:1}}>
                  <p style={{fontSize:13,fontWeight:600,color:'var(--ink)'}}>{b.client_name}</p>
                  <p style={{fontSize:11,color:'var(--ink3)'}}>{b.service_name} · {s?.name}</p>
                </div>
              </div>
            );
          })
        }
        </div>
      </div>
      {activeBooking&&(
        <BookingActionModal booking={activeBooking} bookings={bookings} staff={staff} services={services}
          schedules={schedules} dayBlocks={dayBlocks} dayOverrides={dayOverrides}
          onSave={()=>{setActiveBooking(null);setToast('✓ Salvato');onRefresh();}}
          onClose={()=>setActiveBooking(null)} />
      )}
    </div>
  );
}

// ── ADMIN CALENDAR ───────────────────────────────────────────────
function AdminCalendar({ bookings, onRefresh, setToast, staff, services, schedules, dayBlocks, dayOverrides }) {
  const [weekOffset, setWeekOffset] = useState(0);
  const [selectedDay, setSelectedDay] = useState(0);
  const [showPicker, setShowPicker] = useState(false);
  const [activeBooking, setActiveBooking] = useState(null);
  const weekDates = getWeekDates(weekOffset);

  const dateStr = toLocalDate(weekDates[selectedDay]);
  const dayBks  = bookings.filter(b=>b.date===dateStr&&b.status!=='cancelled');
  const DISPLAY_HOURS = ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'];
  const CAL_START = 8;

  const timeToY = (t) => {
    const [h,m]=(t||'08:00').slice(0,5).split(':').map(Number);
    return (h-CAL_START)*60+m;
  };

  return (
    <div className="screen">
      <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
        <h2 style={{fontSize:22,fontWeight:700,color:'var(--ink)',marginBottom:12,letterSpacing:-0.3}}>Calendario</h2>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <button className="btn-icon" onClick={()=>setWeekOffset(o=>o-1)}>‹</button>
          <div style={{position:'relative'}}>
            <button onClick={()=>setShowPicker(p=>!p)}
              style={{fontSize:13,fontWeight:600,color:'var(--ink)',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'5px 12px',cursor:'pointer'}}>
              {MONTHS[weekDates[0].getMonth()]} {weekDates[0].getFullYear()} ▾
            </button>
            {showPicker && <MonthYearPicker allowPast weekDates={weekDates} setWeekOffset={setWeekOffset} onClose={()=>setShowPicker(false)} />}
          </div>
          <button className="btn-icon" onClick={()=>setWeekOffset(o=>o+1)}>›</button>
        </div>
        <div style={{display:'flex',gap:4,marginBottom:12}}>
          {weekDates.slice(0,6).map((d,i)=>{
            const hasBks=bookings.some(b=>b.date===toLocalDate(d)&&b.status!=='cancelled');
            const isToday=d.toDateString()===new Date().toDateString();
            return(
              <button key={i} onClick={()=>setSelectedDay(i)}
                style={{flex:1,padding:'8px 4px',borderRadius:10,border:'1.5px solid',textAlign:'center',position:'relative',
                  background:selectedDay===i?'var(--ink)':isToday?'var(--gold-bg)':'var(--bg)',
                  borderColor:selectedDay===i?'var(--ink)':isToday?'var(--gold-dim)':'var(--border)',transition:'all 0.15s'}}>
                <p style={{fontSize:9,fontWeight:600,color:selectedDay===i?'rgba(255,255,255,0.6)':isToday?'var(--gold)':'var(--ink3)',textTransform:'uppercase',letterSpacing:0.3}}>{DAYS_SHORT[i]}</p>
                <p style={{fontSize:16,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:selectedDay===i?'white':'var(--ink)'}}>{d.getDate()}</p>
                {hasBks&&<div style={{position:'absolute',bottom:4,left:'50%',transform:'translateX(-50%)',width:4,height:4,borderRadius:'50%',background:selectedDay===i?'var(--gold)':'var(--ink3)'}}></div>}
              </button>
            );
          })}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'48px 1fr 1fr',gap:0,borderBottom:'1px solid var(--border)',paddingBottom:8}}>
          <div></div>
          {staff.map(s=>{
            const dayEarnings = dayBks
              .filter(b=>b.staff_id===s.id&&b.earnings!=null)
              .reduce((sum,b)=>sum+Number(b.earnings),0);
            const net = +(dayEarnings*0.45).toFixed(2);
            return (
              <div key={s.id} style={{textAlign:'center'}}>
                <div className="avatar" style={{width:28,height:28,fontSize:10,background:s.color,color:'white',margin:'0 auto 2px',fontWeight:700}}>{s.initials}</div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                  <p style={{fontSize:10,fontWeight:600,color:'var(--ink)',letterSpacing:0.2}}>{s.name}</p>
                  {dayEarnings>0&&<span style={{fontSize:9,fontWeight:700,color:'var(--ink2)',background:'rgba(0,0,0,0.08)',borderRadius:3,padding:'1px 3px',lineHeight:1.4}}>€{net}</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="scroll-content" style={{padding:'0 16px 24px'}}>
        <div style={{position:'relative',marginTop:8}}>
          {DISPLAY_HOURS.map(h=>(
            <div key={h} style={{display:'grid',gridTemplateColumns:'48px 1fr 1fr',height:72,position:'relative'}}>
              {/* Riga intera ora */}
              <div style={{paddingRight:8,textAlign:'right'}}><span style={{fontSize:13,color:'var(--ink2)',fontWeight:600,fontFamily:"'Cormorant Garamond',serif"}}>{h}</span></div>
              <div style={{borderTop:'1px solid var(--border)'}}></div>
              <div style={{borderTop:'1px solid var(--border)',borderLeft:'1px solid var(--border)'}}></div>
              {/* Riga mezzora */}
              <div style={{position:'absolute',top:36,left:0,right:0,display:'grid',gridTemplateColumns:'48px 1fr 1fr',pointerEvents:'none'}}>
                <div style={{paddingRight:8,textAlign:'right'}}><span style={{fontSize:10,color:'var(--ink3)',fontFamily:"'Cormorant Garamond',serif"}}>:30</span></div>
                <div style={{borderTop:'1px dashed var(--border)'}}></div>
                <div style={{borderTop:'1px dashed var(--border)',borderLeft:'1px solid var(--border)'}}></div>
              </div>
            </div>
          ))}
          <div style={{position:'absolute',top:0,left:48,right:0,bottom:0,display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}}>
            {staff.map((s,si)=>(
              <div key={s.id} style={{position:'relative',borderLeft:si===1?'1px solid var(--border)':'none'}}>
                {dayBks.filter(b=>b.staff_id===s.id).map(b=>{
                  const top=timeToY(b.time)*(72/60);
                  const h=Math.ceil((b.service_duration||30)/30)*30*(72/60);
                  return(
                    <div key={b.id} onClick={()=>setActiveBooking(b)} style={{
                      position:'absolute',top,left:4,right:4,height:h,
                      background:b.status==='confirmed'?s.color:'var(--gold-bg)',
                      borderLeft:`3px solid ${b.status==='confirmed'?s.color:'var(--gold)'}`,
                      border:`1px solid rgba(0,0,0,0.22)`,
                      borderLeft:`3px solid ${b.status==='confirmed'?s.color:'var(--gold)'}`,
                      borderRadius:6,padding:'4px 6px',overflow:'hidden',cursor:'pointer',opacity:b.status==='confirmed'?1:0.8}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:2}}>
                        <p style={{fontSize:10,fontWeight:700,color:b.status==='confirmed'?'white':'var(--ink)',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',flex:1}}>{b.client_name}</p>
                        {b.earnings!=null&&<span style={{fontSize:9,fontWeight:700,flexShrink:0,color:b.status==='confirmed'?'rgba(255,255,255,0.9)':'var(--ink2)',background:'rgba(0,0,0,0.15)',borderRadius:3,padding:'1px 3px',lineHeight:1.4}}>€{b.earnings}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      </div>
      {activeBooking&&(
        <BookingActionModal booking={activeBooking} bookings={bookings} staff={staff} services={services}
          schedules={schedules} dayBlocks={dayBlocks} dayOverrides={dayOverrides}
          onSave={()=>{setActiveBooking(null);setToast('✓ Salvato');onRefresh();}}
          onClose={()=>setActiveBooking(null)} />
      )}
    </div>
  );
}

// ── WEEKLY CONFIG EDITOR ────────────────────────────────────────
function WeeklyConfigEditor({ config, onChange }) {
  const WEEK = [
    {dow:1,label:'Lunedì'},{dow:2,label:'Martedì'},{dow:3,label:'Mercoledì'},
    {dow:4,label:'Giovedì'},{dow:5,label:'Venerdì'},{dow:6,label:'Sabato'},{dow:0,label:'Domenica'},
  ];
  const setDay = (dow, val) => onChange({...config, [dow]: val});
  const timeInput = (value, onCh) => (
    <input type="time" value={value} onChange={e=>onCh(e.target.value)}
      style={{background:'var(--bg)',border:'1.5px solid var(--border)',borderRadius:8,
        padding:'7px 10px',fontSize:13,fontWeight:600,color:'var(--ink)',outline:'none'}} />
  );
  return (
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {WEEK.map(({dow,label})=>{
        const day = config?.[dow];
        const isOpen = !!day;
        return (
          <div key={dow} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px'}}>
              <span style={{fontSize:14,fontWeight:600,color:'var(--ink)'}}>{label}</span>
              <button onClick={()=>setDay(dow, isOpen?null:{start:'09:30',end:'19:30',breaks:[]})}
                style={{fontSize:12,fontWeight:700,padding:'6px 14px',borderRadius:8,border:'none',
                  background:isOpen?'var(--ink)':'var(--bg3)',color:isOpen?'white':'var(--ink3)'}}>
                {isOpen?'Aperto':'Chiuso'}
              </button>
            </div>
            {isOpen&&(
              <div style={{padding:'0 14px 14px',borderTop:'1px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginTop:12,marginBottom:12}}>
                  <div><p style={{fontSize:10,color:'var(--ink3)',marginBottom:3}}>Inizio</p>{timeInput(day.start,v=>setDay(dow,{...day,start:v}))}</div>
                  <span style={{color:'var(--ink3)',fontWeight:700,marginTop:16}}>–</span>
                  <div><p style={{fontSize:10,color:'var(--ink3)',marginBottom:3}}>Fine</p>{timeInput(day.end,v=>setDay(dow,{...day,end:v}))}</div>
                </div>
                {(day.breaks||[]).length>0&&<p style={{fontSize:10,fontWeight:600,color:'var(--ink2)',textTransform:'uppercase',letterSpacing:0.4,marginBottom:6}}>Pause fisse</p>}
                {(day.breaks||[]).map((br,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                    {timeInput(br.start,v=>setDay(dow,{...day,breaks:day.breaks.map((b,idx)=>idx===i?{...b,start:v}:b)}))}
                    <span style={{color:'var(--ink3)'}}>–</span>
                    {timeInput(br.end,v=>setDay(dow,{...day,breaks:day.breaks.map((b,idx)=>idx===i?{...b,end:v}:b)}))}
                    <button onClick={()=>setDay(dow,{...day,breaks:day.breaks.filter((_,idx)=>idx!==i)})}
                      style={{fontSize:11,color:'oklch(45% 0.18 25)',fontWeight:600,padding:'6px 8px',borderRadius:6,
                        border:'1px solid oklch(90% 0.04 20)',background:'oklch(98% 0.02 20)',flexShrink:0}}>✕</button>
                  </div>
                ))}
                <button onClick={()=>setDay(dow,{...day,breaks:[...(day.breaks||[]),{start:'12:30',end:'13:30'}]})}
                  style={{fontSize:11,fontWeight:600,color:'var(--gold)',padding:'5px 10px',borderRadius:7,
                    border:'1px solid var(--gold-dim)',background:'var(--gold-bg)',marginTop:4}}>
                  + Pausa fissa
                </button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── ADMIN STAFF ──────────────────────────────────────────────────
function AdminStaff({ bookings, schedules, setSchedules, dayBlocks, setDayBlocks, dayOverrides, setDayOverrides, setToast, staff, setStaff, services, setServices }) {
  const [section, setSection]           = useState('staff');
  const [selected, setSelected]         = useState(null);
  const [editingProfile, setEditProfile]= useState(null);
  const [draftProfile, setDraftProfile] = useState(null);
  const [editingSchedule, setEditSched] = useState(null);
  const [draftSchedule, setDraftSched]  = useState(null);
  const [scheduleSection, setScheduleSection] = useState('menu'); // menu | weekly | blocks | overrides
  const [addingStaff, setAddingStaff]   = useState(false);
  const [newDraft, setNewDraft]         = useState({fullName:'',role:'Barber',phone:'',email:'',color:'oklch(65% 0.14 240)'});
  const [editingService, setEditSvc]    = useState(null);
  const [draftService, setDraftService] = useState(null);
  const [addingBlock, setAddingBlock]   = useState(null);
  const [blockDraft, setBlockDraft]     = useState({date:'',start:'',end:''});
  const [editingOverride, setEditingOverride] = useState(null); // null | 'new' | id
  const [overrideDraft, setOverrideDraft]     = useState({date:'',start_time:'09:00',end_time:'19:00',breaks:[],closed:false});
  const [busy, setBusy]                 = useState(false);

  const buildInitials = (fullName) => {
    const parts = fullName.trim().split(' ').filter(Boolean);
    return parts.length>=2 ? (parts[0][0]+parts[parts.length-1][0]).toUpperCase() : fullName.slice(0,2).toUpperCase();
  };
  const buildShortName = (fullName) => {
    const parts = fullName.trim().split(' ').filter(Boolean);
    return parts.length>=2 ? parts[0]+' '+parts[parts.length-1][0]+'.' : parts[0];
  };

  const saveProfile = async () => {
    if (!draftProfile) return;
    setBusy(true);
    const initials   = buildInitials(draftProfile.full_name);
    const name       = buildShortName(draftProfile.full_name);
    const updated    = {...draftProfile, initials, name};
    const { error }  = await supabase.from('staff').update({full_name:updated.full_name,name,role:updated.role,phone:updated.phone,email:updated.email,color:updated.color,initials}).eq('id',editingProfile);
    setBusy(false);
    if (error) { setToast('Errore: '+error.message); return; }
    setStaff(prev=>prev.map(s=>s.id===editingProfile?{...s,...updated,initials,name}:s));
    setEditProfile(null); setDraftProfile(null); setToast('Profilo aggiornato');
  };

  const saveNewStaff = async () => {
    if (!newDraft.fullName.trim()) return;
    setBusy(true);
    const initials  = buildInitials(newDraft.fullName);
    const name      = buildShortName(newDraft.fullName);
    const { data, error } = await supabase.from('staff').insert({full_name:newDraft.fullName,name,role:newDraft.role,phone:newDraft.phone,email:newDraft.email,color:newDraft.color,initials}).select().single();
    if (!error&&data) {
      await supabase.from('staff_schedules').insert({staff_id:data.id, weekly_config:DEFAULT_WEEKLY_CONFIG});
      setStaff(prev=>[...prev,data]);
      setSchedules(prev=>({...prev,[data.id]:{...DEFAULT_WEEKLY_CONFIG}}));
      setToast('✓ Dipendente aggiunto');
    } else { setToast('Errore: '+(error?.message||'')); }
    setBusy(false);
    setAddingStaff(false);
    setNewDraft({fullName:'',role:'Barber',phone:'',email:'',color:'oklch(65% 0.14 240)'});
  };

  const deleteStaff = async (id) => {
    if (!window.confirm('Eliminare questo dipendente? Le prenotazioni esistenti rimarranno nello storico.')) return;
    setBusy(true);
    await supabase.from('staff_schedules').delete().eq('staff_id', id);
    const { error } = await supabase.from('staff').delete().eq('id', id);
    setBusy(false);
    if (error) { setToast('Errore: ' + error.message); return; }
    setStaff(prev => prev.filter(s => s.id !== id));
    setSchedules(prev => { const n = {...prev}; delete n[id]; return n; });
    setSelected(null);
    setToast('Dipendente eliminato');
  };

  const saveSchedule = async () => {
    if (!draftSchedule) return;
    setBusy(true);
    const { error } = await supabase.from('staff_schedules').upsert({
      staff_id: editingSchedule, weekly_config: draftSchedule, updated_at: new Date().toISOString()
    });
    setBusy(false);
    if (error) { setToast('Errore: '+error.message); return; }
    setSchedules(prev=>({...prev,[editingSchedule]:draftSchedule}));
    setEditSched(null); setDraftSched(null); setToast('✓ Orario salvato');
  };

  const saveBlock = async () => {
    if (!blockDraft.date||!blockDraft.start||!blockDraft.end) return;
    setBusy(true);
    const { data, error } = await supabase.from('staff_day_blocks').insert({
      staff_id: addingBlock, date: blockDraft.date,
      start_time: blockDraft.start, end_time: blockDraft.end,
    }).select().single();
    setBusy(false);
    if (error) { setToast('Errore: '+error.message); return; }
    setDayBlocks(prev=>({...prev,[addingBlock]:[...(prev[addingBlock]||[]),data]}));
    setAddingBlock(null); setBlockDraft({date:'',start:'',end:''});
    setToast('✓ Pausa aggiunta');
  };

  const deleteBlock = async (staffId, blockId) => {
    await supabase.from('staff_day_blocks').delete().eq('id', blockId);
    setDayBlocks(prev=>({...prev,[staffId]:(prev[staffId]||[]).filter(b=>b.id!==blockId)}));
    setToast('Pausa rimossa');
  };

  const saveOverride = async () => {
    if (!overrideDraft.date) return;
    setBusy(true);
    const payload = {
      staff_id:   editingSchedule,
      date:       overrideDraft.date,
      start_time: overrideDraft.closed ? null : overrideDraft.start_time,
      end_time:   overrideDraft.closed ? null : overrideDraft.end_time,
      breaks:     overrideDraft.closed ? [] : (overrideDraft.breaks||[]).filter(b=>b.start&&b.end),
    };
    const { data, error } = await supabase.from('staff_day_overrides')
      .upsert(payload, { onConflict: 'staff_id,date' })
      .select().single();
    setBusy(false);
    if (error) { setToast('Errore: '+error.message); return; }
    setDayOverrides(prev => {
      const list = (prev[editingSchedule]||[]).filter(o=>o.date!==overrideDraft.date);
      return {...prev, [editingSchedule]: [...list, data].sort((a,b)=>a.date.localeCompare(b.date))};
    });
    setEditingOverride(null);
    setOverrideDraft({date:'',start_time:'09:00',end_time:'19:00',breaks:[],closed:false});
    setToast('✓ Orario salvato');
  };

  const deleteOverride = async (staffId, id) => {
    await supabase.from('staff_day_overrides').delete().eq('id', id);
    setDayOverrides(prev=>({...prev,[staffId]:(prev[staffId]||[]).filter(o=>o.id!==id)}));
    setToast('Modifica rimossa');
  };

  const saveService = async () => {
    if (!draftService?.name?.trim()) return;
    setBusy(true);
    if (editingService==='new') {
      const { data, error } = await supabase.from('services').insert({name:draftService.name,duration:draftService.duration,price:draftService.price||null}).select().single();
      if (!error&&data) { setServices(prev=>[...prev,data]); setToast('✓ Servizio aggiunto'); }
      else setToast('Errore: '+(error?.message||''));
    } else {
      const { error } = await supabase.from('services').update({name:draftService.name,duration:draftService.duration,price:draftService.price||null}).eq('id',editingService);
      if (!error) { setServices(prev=>prev.map(s=>s.id===editingService?{...s,...draftService}:s)); setToast('✓ Servizio salvato'); }
      else setToast('Errore: '+(error?.message||''));
    }
    setBusy(false); setEditSvc(null); setDraftService(null);
  };

  const deleteService = async (id) => {
    await supabase.from('services').update({active:false}).eq('id',id);
    setServices(prev=>prev.filter(s=>s.id!==id));
    setToast('Servizio rimosso');
  };

  // Schermate sub-navigazione
  if (addingStaff) return (
    <div className="screen">
      <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
          <button className="btn-icon" onClick={()=>setAddingStaff(false)}>←</button>
          <h2 style={{fontSize:20,fontWeight:700,color:'var(--ink)',letterSpacing:-0.3}}>Nuovo dipendente</h2>
        </div>
      </div>
      <div className="scroll-content" style={{padding:'16px 24px 100px'}}>
        <div style={{display:'flex',justifyContent:'center',marginBottom:24}}>
          <div className="avatar" style={{width:72,height:72,fontSize:24,background:newDraft.color,color:'white',fontWeight:700}}>
            {newDraft.fullName?buildInitials(newDraft.fullName):'?'}
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div className="input-group"><label className="input-label">Nome completo *</label>
            <input className="input-field" value={newDraft.fullName} placeholder="es. Giovanni Bianchi" onChange={e=>setNewDraft(p=>({...p,fullName:e.target.value}))} /></div>
          <div className="input-group"><label className="input-label">Ruolo</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:4}}>
              {ROLE_OPTIONS.map(r=><button key={r} onClick={()=>setNewDraft(p=>({...p,role:r}))} className={`chip ${newDraft.role===r?'selected':''}`}>{r}</button>)}
            </div></div>
          <div className="input-group"><label className="input-label">Telefono</label>
            <input className="input-field" value={newDraft.phone} onChange={e=>setNewDraft(p=>({...p,phone:e.target.value}))} placeholder="345 000 0000" /></div>
          <div className="input-group"><label className="input-label">Email</label>
            <input className="input-field" type="email" value={newDraft.email} onChange={e=>setNewDraft(p=>({...p,email:e.target.value}))} placeholder="nome@hairstudios.it" /></div>
          <div className="input-group"><label className="input-label">Colore avatar</label>
            <div style={{display:'flex',gap:10,marginTop:4}}>
              {COLOR_OPTIONS.map(c=><button key={c.value} onClick={()=>setNewDraft(p=>({...p,color:c.value}))}
                style={{width:36,height:36,borderRadius:'50%',background:c.value,border:'3px solid',borderColor:newDraft.color===c.value?'var(--ink)':'transparent',transition:'border-color 0.15s'}}></button>)}
            </div></div>
        </div>
      </div>
      <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 24px 28px',background:'var(--bg)',borderTop:'1px solid var(--border)'}}>
        <button className="btn-primary" style={{opacity:newDraft.fullName.trim()&&!busy?1:0.4}} disabled={!newDraft.fullName.trim()||busy} onClick={saveNewStaff}>
          {busy?'Salvataggio...':'Aggiungi dipendente'}
        </button>
      </div>
    </div>
  );

  if (editingProfile!==null&&draftProfile) {
    return (
      <div className="screen">
        <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
            <button className="btn-icon" onClick={()=>{setEditProfile(null);setDraftProfile(null);}}>←</button>
            <h2 style={{fontSize:20,fontWeight:700,color:'var(--ink)',letterSpacing:-0.3}}>Modifica profilo</h2>
          </div>
        </div>
        <div className="scroll-content" style={{padding:'16px 24px 100px'}}>
          <div style={{display:'flex',justifyContent:'center',marginBottom:24}}>
            <div className="avatar" style={{width:72,height:72,fontSize:24,background:draftProfile.color,color:'white',fontWeight:700}}>
              {draftProfile.initials}
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div className="input-group"><label className="input-label">Nome completo *</label>
              <input className="input-field" value={draftProfile.full_name} onChange={e=>setDraftProfile(p=>({...p,full_name:e.target.value}))} /></div>
            <div className="input-group"><label className="input-label">Ruolo</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:4}}>
                {ROLE_OPTIONS.map(r=><button key={r} onClick={()=>setDraftProfile(p=>({...p,role:r}))} className={`chip ${draftProfile.role===r?'selected':''}`}>{r}</button>)}
              </div></div>
            <div className="input-group"><label className="input-label">Telefono</label>
              <input className="input-field" value={draftProfile.phone||''} onChange={e=>setDraftProfile(p=>({...p,phone:e.target.value}))} placeholder="345 000 0000" /></div>
            <div className="input-group"><label className="input-label">Email</label>
              <input className="input-field" type="email" value={draftProfile.email||''} onChange={e=>setDraftProfile(p=>({...p,email:e.target.value}))} placeholder="nome@hairstudios.it" /></div>
            <div className="input-group"><label className="input-label">Colore avatar</label>
              <div style={{display:'flex',gap:10,marginTop:4}}>
                {COLOR_OPTIONS.map(c=><button key={c.value} onClick={()=>setDraftProfile(p=>({...p,color:c.value}))}
                  style={{width:36,height:36,borderRadius:'50%',background:c.value,border:'3px solid',borderColor:draftProfile.color===c.value?'var(--ink)':'transparent',transition:'border-color 0.15s'}}></button>)}
              </div></div>
            <div style={{marginTop:8,paddingTop:16,borderTop:'1px solid var(--border)'}}>
              <button onClick={()=>deleteStaff(editingProfile)} disabled={busy}
                style={{width:'100%',padding:'12px',borderRadius:'var(--radius-sm)',border:'1px solid oklch(90% 0.04 20)',
                  fontSize:13,fontWeight:600,color:'oklch(45% 0.18 25)',background:'oklch(98% 0.02 20)'}}>
                Elimina dipendente
              </button>
            </div>
          </div>
        </div>
        <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 24px 28px',background:'var(--bg)',borderTop:'1px solid var(--border)'}}>
          <button className="btn-primary" style={{opacity:draftProfile.full_name?.trim()&&!busy?1:0.4}} disabled={!draftProfile.full_name?.trim()||busy} onClick={saveProfile}>
            {busy?'Salvataggio...':'Salva modifiche'}
          </button>
        </div>
      </div>
    );
  }

  if (addingBlock!==null) {
    const s=staff.find(st=>st.id===addingBlock);
    return (
      <div className="screen">
        <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
            <button className="btn-icon" onClick={()=>setAddingBlock(null)}>←</button>
            <h2 style={{fontSize:20,fontWeight:700,color:'var(--ink)',letterSpacing:-0.3}}>Aggiungi pausa — {s?.name}</h2>
          </div>
        </div>
        <div className="scroll-content" style={{padding:'20px 24px 100px'}}>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div className="input-group"><label className="input-label">Data</label>
              <input type="date" className="input-field" value={blockDraft.date} min={toLocalDate(new Date())}
                onChange={e=>setBlockDraft(p=>({...p,date:e.target.value}))} /></div>
            <div style={{display:'flex',gap:12}}>
              <div className="input-group" style={{flex:1}}><label className="input-label">Dalle</label>
                <input type="time" className="input-field" value={blockDraft.start} onChange={e=>setBlockDraft(p=>({...p,start:e.target.value}))} /></div>
              <div className="input-group" style={{flex:1}}><label className="input-label">Alle</label>
                <input type="time" className="input-field" value={blockDraft.end} onChange={e=>setBlockDraft(p=>({...p,end:e.target.value}))} /></div>
            </div>
          </div>
        </div>
        <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 24px 28px',background:'var(--bg)',borderTop:'1px solid var(--border)'}}>
          <button className="btn-primary" onClick={saveBlock} disabled={!blockDraft.date||!blockDraft.start||!blockDraft.end||busy}
            style={{opacity:blockDraft.date&&blockDraft.start&&blockDraft.end&&!busy?1:0.4}}>
            {busy?'Salvataggio...':'Salva pausa'}
          </button>
        </div>
      </div>
    );
  }

  if (editingSchedule!==null&&draftSchedule) {
    const s=staff.find(st=>st.id===editingSchedule);
    const blocks=(dayBlocks[editingSchedule]||[]).filter(b=>b.date>=toLocalDate(new Date()));
    const overrides=(dayOverrides[editingSchedule]||[]).filter(o=>o.date>=toLocalDate(new Date()));

    // ── MENU PRINCIPALE 3 SEZIONI ──────────────────────────────
    if (scheduleSection==='menu') return(
      <div className="screen">
        <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
            <button className="btn-icon" onClick={()=>{setEditSched(null);setDraftSched(null);setScheduleSection('menu');}}>←</button>
            <div><p style={{fontSize:11,color:'var(--ink3)'}}>Orario di</p>
              <h2 style={{fontSize:20,fontWeight:700,color:'var(--ink)',letterSpacing:-0.3}}>{s?.name}</h2></div>
          </div>
        </div>
        <div className="scroll-content" style={{padding:'20px 24px 32px',display:'flex',flexDirection:'column',gap:12}}>
          <button onClick={()=>setScheduleSection('weekly')}
            style={{display:'flex',alignItems:'center',gap:14,padding:'16px 18px',borderRadius:'var(--radius-sm)',background:'var(--bg2)',border:'1px solid var(--border)',textAlign:'left',width:'100%'}}>
            <div style={{width:44,height:44,borderRadius:12,background:'var(--ink)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:20}}>🗓️</div>
            <div style={{flex:1}}>
              <p style={{fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)'}}>Modifica orari massiva</p>
              <p style={{fontSize:11,color:'var(--ink3)',marginTop:2}}>Imposta gli orari standard di ogni giorno della settimana</p>
            </div>
            <span style={{color:'var(--ink3)',fontSize:18}}>›</span>
          </button>
          <button onClick={()=>setScheduleSection('blocks')}
            style={{display:'flex',alignItems:'center',gap:14,padding:'16px 18px',borderRadius:'var(--radius-sm)',background:'var(--bg2)',border:'1px solid var(--border)',textAlign:'left',width:'100%'}}>
            <div style={{width:44,height:44,borderRadius:12,background:'var(--gold)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:20}}>⏸️</div>
            <div style={{flex:1}}>
              <p style={{fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)'}}>Pause extra su data</p>
              <p style={{fontSize:11,color:'var(--ink3)',marginTop:2}}>Permessi e pause su un giorno specifico ({blocks.length} attive)</p>
            </div>
            <span style={{color:'var(--ink3)',fontSize:18}}>›</span>
          </button>
          <button onClick={()=>setScheduleSection('overrides')}
            style={{display:'flex',alignItems:'center',gap:14,padding:'16px 18px',borderRadius:'var(--radius-sm)',background:'var(--bg2)',border:'1px solid var(--border)',textAlign:'left',width:'100%'}}>
            <div style={{width:44,height:44,borderRadius:12,background:'oklch(55% 0.15 240)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:20}}>📅</div>
            <div style={{flex:1}}>
              <p style={{fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)'}}>Modifiche orario su data</p>
              <p style={{fontSize:11,color:'var(--ink3)',marginTop:2}}>Cambia completamente l'orario di un singolo giorno ({overrides.length} attive)</p>
            </div>
            <span style={{color:'var(--ink3)',fontSize:18}}>›</span>
          </button>
        </div>
      </div>
    );

    // ── SEZIONE WEEKLY ─────────────────────────────────────────
    if (scheduleSection==='weekly') return(
      <div className="screen">
        <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
            <button className="btn-icon" onClick={()=>setScheduleSection('menu')}>←</button>
            <div><p style={{fontSize:11,color:'var(--ink3)'}}>{s?.name}</p>
              <h2 style={{fontSize:20,fontWeight:700,color:'var(--ink)',letterSpacing:-0.3}}>Modifica orari massiva</h2></div>
          </div>
        </div>
        <div className="scroll-content" style={{padding:'12px 24px 100px'}}>
          <WeeklyConfigEditor config={draftSchedule} onChange={setDraftSched} />
        </div>
        <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 24px 28px',background:'var(--bg)',borderTop:'1px solid var(--border)'}}>

        </div>
      </div>
    );

    // ── SEZIONE BLOCKS (Pause extra) ───────────────────────────
    if (scheduleSection==='blocks') return(
      <div className="screen">
        <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
            <button className="btn-icon" onClick={()=>setScheduleSection('menu')}>←</button>
            <div><p style={{fontSize:11,color:'var(--ink3)'}}>{s?.name}</p>
              <h2 style={{fontSize:20,fontWeight:700,color:'var(--ink)',letterSpacing:-0.3}}>Pause extra su data</h2></div>
          </div>
        </div>
        <div className="scroll-content" style={{padding:'16px 24px 100px'}}>
          <p style={{fontSize:12,color:'var(--ink3)',marginBottom:14,lineHeight:1.5}}>Inserisci permessi o pause temporanee su giorni specifici. L'orario settimanale resta invariato.</p>
          <button onClick={()=>setAddingBlock(editingSchedule)}
            style={{width:'100%',padding:'12px',marginBottom:16,borderRadius:'var(--radius-sm)',background:'var(--gold-bg)',border:'1.5px dashed var(--gold-dim)',color:'var(--gold)',fontSize:13,fontWeight:700,cursor:'pointer'}}>
            + Aggiungi pausa
          </button>
          {blocks.length===0&&<p style={{fontSize:12,color:'var(--ink3)',fontStyle:'italic',textAlign:'center',padding:'20px 0'}}>Nessuna pausa programmata</p>}
          {blocks.map(b=>(
            <div key={b.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',background:'var(--bg2)',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',marginBottom:8}}>
              <div>
                <p style={{fontSize:13,fontWeight:600,color:'var(--ink)'}}>{new Date(b.date+'T12:00:00').toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'long'})}</p>
                <p style={{fontSize:12,color:'var(--ink3)'}}>{b.start_time.slice(0,5)} – {b.end_time.slice(0,5)}</p>
              </div>
              <button onClick={()=>deleteBlock(editingSchedule,b.id)}
                style={{fontSize:11,color:'oklch(45% 0.18 25)',fontWeight:600,padding:'5px 10px',borderRadius:6,border:'1px solid oklch(90% 0.04 20)',background:'oklch(98% 0.02 20)',cursor:'pointer'}}>
                Rimuovi
              </button>
            </div>
          ))}
        </div>
      </div>
    );

    // ── SEZIONE OVERRIDES (Modifiche orario su data) ───────────
    if (scheduleSection==='overrides') {
      if (editingOverride!==null) return(
        <div className="screen">
          <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
              <button className="btn-icon" onClick={()=>{setEditingOverride(null);setOverrideDraft({date:'',start_time:'09:00',end_time:'19:00',breaks:[],closed:false});}}>←</button>
              <h2 style={{fontSize:20,fontWeight:700,color:'var(--ink)',letterSpacing:-0.3}}>{editingOverride==='new'?'Nuova modifica':'Modifica orario'}</h2>
            </div>
          </div>
          <div className="scroll-content" style={{padding:'16px 24px 100px'}}>
            <div className="input-group">
              <label className="input-label">Data</label>
              <input type="date" className="input-field" value={overrideDraft.date} min={toLocalDate(new Date())}
                disabled={editingOverride!=='new'}

            </div>
            <div style={{display:'flex',alignItems:'center',gap:10,margin:'14px 0',padding:'10px 14px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)'}}>
              <input type="checkbox" id="ovrClosed" checked={overrideDraft.closed} onChange={e=>setOverrideDraft(p=>({...p,closed:e.target.checked}))} style={{width:18,height:18}} />
              <label htmlFor="ovrClosed" style={{fontSize:14,fontWeight:600,color:'var(--ink)',cursor:'pointer'}}>Giorno chiuso</label>
            </div>
            {!overrideDraft.closed&&(<>
              <div style={{display:'flex',gap:12,marginBottom:12}}>
                <div className="input-group" style={{flex:1}}>
                  <label className="input-label">Apertura</label>
                  <input type="time" className="input-field" value={overrideDraft.start_time}
                    onChange={e=>setOverrideDraft(p=>({...p,start_time:e.target.value}))} />
                </div>
                <div className="input-group" style={{flex:1}}>
                  <label className="input-label">Chiusura</label>
                  <input type="time" className="input-field" value={overrideDraft.end_time}
                    onChange={e=>setOverrideDraft(p=>({...p,end_time:e.target.value}))} />
                </div>
              </div>
              <div style={{marginTop:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <p style={{fontSize:12,fontWeight:600,color:'var(--ink2)',textTransform:'uppercase',letterSpacing:0.5}}>Pause</p>
                  <button onClick={()=>setOverrideDraft(p=>({...p,breaks:[...(p.breaks||[]),{start:'12:30',end:'13:30'}]}))}
                    style={{fontSize:11,fontWeight:600,color:'var(--gold)',padding:'4px 8px',borderRadius:6,border:'1px solid var(--gold-dim)',background:'var(--gold-bg)',cursor:'pointer'}}>+ Pausa</button>
                </div>
                {(overrideDraft.breaks||[]).map((b,i)=>(
                  <div key={i} style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
                    <input type="time" className="input-field" style={{flex:1}} value={b.start}
                      onChange={e=>setOverrideDraft(p=>({...p,breaks:p.breaks.map((x,j)=>j===i?{...x,start:e.target.value}:x)}))} />
                    <span style={{color:'var(--ink3)'}}>–</span>
                    <input type="time" className="input-field" style={{flex:1}} value={b.end}
                      onChange={e=>setOverrideDraft(p=>({...p,breaks:p.breaks.map((x,j)=>j===i?{...x,end:e.target.value}:x)}))} />
                    <button onClick={()=>setOverrideDraft(p=>({...p,breaks:p.breaks.filter((_,j)=>j!==i)}))}
                      style={{padding:'8px 10px',borderRadius:6,background:'oklch(98% 0.02 20)',border:'1px solid oklch(90% 0.04 20)',color:'oklch(45% 0.18 25)',cursor:'pointer'}}>✕</button>
                  </div>

              </div>

          <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 24px 28px',background:'var(--bg)',borderTop:'1px solid var(--border)'}}>
            <button className="btn-primary" disabled={!overrideDraft.date||busy} onClick={saveOverride}

        </div>
      );
      return(
        <div className="screen">
          <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
              <button className="btn-icon" onClick={()=>setScheduleSection('menu')}>←</button>
              <div><p style={{fontSize:11,color:'var(--ink3)'}}>{s?.name}</p>

                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:13,fontWeight:600,color:'var(--ink)'}}>{new Date(o.date+'T12:00:00').toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'long'})}</p>

                </div>
                <div style={{display:'flex',gap:6}}>
                  <button onClick={()=>{
                    setEditingOverride(o.id);

                      end_time:o.end_time?o.end_time.slice(0,5):'19:00',
                      breaks:(o.breaks||[]).map(b=>({start:(b.start||'').slice(0,5),end:(b.end||'').slice(0,5)})),

                  <button onClick={()=>deleteOverride(editingSchedule,o.id)}

                </div>
              </div>

  }

  if (editingService!==null&&draftService) return(
    <div className="screen">
      <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
          <button className="btn-icon" onClick={()=>{setEditSvc(null);setDraftService(null);}}>←</button>

        </div>
      </div>
      <div className="scroll-content" style={{padding:'16px 24px 100px'}}>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div className="input-group"><label className="input-label">Nome servizio *</label>
            <input className="input-field" value={draftService.name} placeholder="es. Trattamento barba" onChange={e=>setDraftService(p=>({...p,name:e.target.value}))} /></div>
          <div className="input-group"><label className="input-label">Durata (minuti)</label>
            <div style={{display:'flex',alignItems:'center',gap:12,marginTop:4}}>

              <div style={{flex:1,textAlign:'center',padding:10,background:'var(--bg2)',borderRadius:10,border:'1px solid var(--border)'}}>

                <span style={{fontSize:12,color:'var(--ink3)',marginLeft:4}}>min</span>
              </div>
              <button onClick={()=>setDraftService(p=>({...p,duration:Math.min(240,p.duration+5)}))} style={{width:40,height:40,borderRadius:10,background:'var(--bg2)',border:'1px solid var(--border)',fontSize:20,fontWeight:700,color:'var(--ink)',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:10}}>
              {[15,20,30,45,60,90,120].map(d=><button key={d} onClick={()=>setDraftService(p=>({...p,duration:d}))} className={`chip ${draftService.duration===d?'selected':''}`} style={{fontSize:12}}>{d} min</button>)}
            </div></div>
          <div className="input-group"><label className="input-label">Prezzo (€)</label>
            <input className="input-field" type="number" min="0" step="0.50" value={draftService.price||''} placeholder="es. 18.00" onChange={e=>setDraftService(p=>({...p,price:e.target.value}))} /></div>
        </div>
      </div>
      <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 24px 28px',background:'var(--bg)',borderTop:'1px solid var(--border)'}}>
        <button className="btn-primary" style={{opacity:draftService.name.trim()&&!busy?1:0.4}} disabled={!draftService.name.trim()||busy} onClick={saveService}>
          {busy?'Salvataggio...':'Salva servizio'}
        </button>
      </div>
    </div>
  );

  return(
    <div className="screen">
      <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
        <h2 style={{fontSize:22,fontWeight:700,color:'var(--ink)',marginBottom:16,letterSpacing:-0.3}}>Gestione Staff</h2>
        <div style={{display:'flex',background:'var(--bg2)',borderRadius:10,padding:4,marginBottom:16}}>
          {[['staff','Staff'],['services','Servizi']].map(([id,label])=>(
            <button key={id} onClick={()=>setSection(id)}
              style={{flex:1,padding:'8px 0',borderRadius:8,fontSize:13,fontWeight:600,

        {section==='staff'&&(
          <>
            <button className="btn-secondary" style={{marginBottom:16}} onClick={()=>setAddingStaff(true)}>+ Aggiungi dipendente</button>
            {staff.map(s=>{
              const sBks=bookings.filter(b=>b.staff_id===s.id&&b.status!=='cancelled');
              const sch=schedules[s.id]||DEFAULT_WEEKLY_CONFIG;
              const isOpen=selected===s.id;
              return(
                <div key={s.id} className="card" style={{marginBottom:12}}>
                  <button style={{display:'flex',alignItems:'center',gap:14,width:'100%',textAlign:'left'}} onClick={()=>setSelected(isOpen?null:s.id)}>
                    <div className="avatar" style={{width:56,height:56,fontSize:18,background:s.color,color:'white',fontWeight:700}}>{s.initials}</div>
                    <div style={{flex:1}}>
                      <p style={{fontSize:16,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)'}}>{s.name}</p>
                      <p style={{fontSize:12,color:'var(--ink3)',marginTop:2}}>{s.role}</p>
                      <div style={{display:'flex',gap:8,marginTop:6,flexWrap:'wrap'}}>
                        <span className="badge badge-gray">{sBks.length} prenotazioni</span>
                        <span className="badge badge-green">{sBks.filter(b=>b.status==='confirmed').length} confermate</span>
                      </div>
                    </div>
                    <span style={{fontSize:18,color:'var(--ink3)',transform:isOpen?'rotate(180deg)':'rotate(0deg)',transition:'transform 0.2s'}}>↓</span>
                  </button>
                  {isOpen&&(
                    <div style={{marginTop:16,paddingTop:16,borderTop:'1px solid var(--border)'}}>
                      <div style={{display:'flex',gap:4,marginBottom:12}}>
                        {[{dow:1,l:'Lun'},{dow:2,l:'Mar'},{dow:3,l:'Mer'},{dow:4,l:'Gio'},{dow:5,l:'Ven'},{dow:6,l:'Sab'},{dow:0,l:'Dom'}].map(({dow,l})=>{
                          const open=!!(sch&&sch[dow]);
                          return <div key={dow} style={{flex:1,textAlign:'center',padding:'6px 2px',borderRadius:8,background:open?'var(--ink)':'var(--bg3)',border:'1px solid var(--border)'}}>
                            <p style={{fontSize:9,fontWeight:700,color:open?'white':'var(--ink3)'}}>{l}</p>

                      </div>
                      <div style={{display:'flex',gap:8}}>
                        <button onClick={()=>{setEditProfile(s.id);setDraftProfile({...s});}}
                          style={{flex:1,padding:'8px 12px',borderRadius:10,background:'var(--bg2)',color:'var(--ink)',fontSize:12,fontWeight:700,border:'1px solid var(--border)'}}>Profilo</button>
                        <button onClick={()=>{setEditSched(s.id);setDraftSched(sch?{...sch}:{...DEFAULT_WEEKLY_CONFIG});setScheduleSection('menu');}}
                          style={{flex:1,padding:'8px 12px',borderRadius:10,background:'var(--ink)',color:'white',fontSize:12,fontWeight:700,border:'none'}}>Orario</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </>
        )}

        {section==='services'&&(
          <>
            <button className="btn-secondary" style={{marginBottom:16}} onClick={()=>{setEditSvc('new');setDraftService({name:'',duration:30,price:''});}}>+ Aggiungi servizio</button>
            {services.map(s=>(
              <div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 18px',background:'var(--bg2)',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',marginBottom:10}}>
                <div>
                  <p style={{fontSize:14,fontWeight:600,color:'var(--ink)'}}>{s.name}</p>
                  <p style={{fontSize:12,color:'var(--ink3)'}}>{s.duration} min{s.price?` · €${Number(s.price).toFixed(2)}`:''}</p>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={()=>{setEditSvc(s.id);setDraftService({...s});}}
                    style={{padding:'6px 12px',borderRadius:8,border:'1px solid var(--border)',fontSize:12,fontWeight:600,color:'var(--ink)',background:'var(--bg)'}}>Modifica</button>
                  <button onClick={()=>deleteService(s.id)}
                    style={{padding:'6px 12px',borderRadius:8,border:'1px solid oklch(90% 0.04 20)',fontSize:12,fontWeight:600,color:'oklch(45% 0.18 25)',background:'oklch(98% 0.02 20)'}}>Rimuovi</button>
                </div>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}
