// ── ADMIN HISTORY ────────────────────────────────────────────────
function AdminHistory({ bookings, staff }) {
  const [filter, setFilter] = useState('upcoming');
  const [search, setSearch] = useState('');
  const today = TODAY();
  const filtered = [...bookings]
    .filter(b => {
      if (filter==='upcoming') return b.status==='confirmed' && b.date>=today;
      if (filter==='all')      return true;
      return b.status===filter;
    })
    .filter(b => !search.trim() || (b.client_name||'').toLowerCase().includes(search.trim().toLowerCase()))
    .sort((a,b) => {
      const asc = filter==='upcoming';
      return asc
        ? new Date(a.date+' '+a.time) - new Date(b.date+' '+b.time)
        : new Date(b.date+' '+b.time) - new Date(a.date+' '+a.time);
    });

  return(
    <div className="screen">
      <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
        <h2 style={{fontSize:22,fontWeight:700,color:'var(--ink)',marginBottom:12,letterSpacing:-0.3}}>Storico prenotazioni</h2>
        {/* Barra di ricerca */}
        <div style={{position:'relative',marginBottom:12}}>
          <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:15,color:'var(--ink3)',pointerEvents:'none'}}>🔍</span>
          <input
            type="text" value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Cerca per nome…"
            style={{width:'100%',background:'var(--bg2)',border:'1.5px solid var(--border)',borderRadius:'var(--radius-sm)',
              padding:'10px 12px 10px 36px',fontSize:14,color:'var(--ink)',outline:'none',fontFamily:"'Jost',sans-serif"}}
          />
          {search&&<button onClick={()=>setSearch('')} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:16,color:'var(--ink3)',lineHeight:1}}>✕</button>}
        </div>
        <div style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:2}}>
          {[{id:'upcoming',label:'Prossime'},{id:'all',label:'Tutte'},{id:'confirmed',label:'Confermate'},{id:'pending',label:'In attesa'},{id:'cancelled',label:'Annullate'}].map(f=>(
            <button key={f.id} onClick={()=>setFilter(f.id)} className={`chip ${filter===f.id?'selected':''}`}>{f.label}</button>
          ))}
        </div>
      </div>
      <div className="scroll-content" style={{padding:'0 24px 24px'}}>
        {filtered.map(b=>{
          const s=staff.find(st=>st.id===b.staff_id);
          return(
            <div key={b.id} style={{display:'flex',gap:12,alignItems:'flex-start',padding:'14px 0',borderBottom:'1px solid var(--border)'}}>
              <div style={{width:3,background:b.status==='confirmed'?'oklch(60% 0.14 145)':b.status==='cancelled'?'oklch(55% 0.18 25)':'var(--gold)',borderRadius:99,alignSelf:'stretch',flexShrink:0}}></div>
              <div style={{flex:1}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <p style={{fontSize:14,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)'}}>{b.client_name}</p>
                    <p style={{fontSize:12,color:'var(--ink3)',marginTop:2}}>{b.service_name} · {s?.name||'—'}</p>
                    <p style={{fontSize:11,color:'var(--ink3)',marginTop:1}}>{new Date(b.date).toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'long'})} · {b.time?.slice(0,5)}</p>
                  </div>
                  <span className={`badge ${b.status==='confirmed'?'badge-green':b.status==='cancelled'?'badge-red':'badge-gold'}`} style={{fontSize:10,marginTop:4}}>
                    {b.status==='confirmed'?'Confermata':b.status==='cancelled'?'Annullata':'In attesa'}
                  </span>
                </div>
              </div>
            </div>
          );
        })}
        {filtered.length===0&&<p style={{textAlign:'center',padding:'40px 0',color:'var(--ink3)',fontSize:13}}>Nessuna prenotazione trovata</p>}
      </div>
    </div>
  );
}

// ── INSTALL BANNER ──────────────────────────────────────────────
function InstallBanner({ type, onInstall, onDismiss }) {
  return (
    <div style={{position:'fixed',bottom:80,left:16,right:16,zIndex:200,
      background:'var(--ink)',borderRadius:16,padding:'14px 16px',
      boxShadow:'0 8px 32px rgba(0,0,0,0.35)',display:'flex',alignItems:'center',gap:12,
      animation:'slideUp 0.3s ease'}}>
      <img src="/logo.png" alt="" style={{width:40,height:40,borderRadius:10,flexShrink:0,objectFit:'contain',background:'white',padding:2}} />
      <div style={{flex:1,minWidth:0}}>
        <p style={{fontSize:13,fontWeight:700,color:'white',marginBottom:2}}>Installa Hair Studios</p>
        {type==='ios'
          ? <p style={{fontSize:11,color:'rgba(255,255,255,0.6)',lineHeight:1.4}}>Tocca <strong style={{color:'white'}}>⎋ Condividi</strong> → <strong style={{color:'white'}}>"Aggiungi a schermata Home"</strong></p>
          : <p style={{fontSize:11,color:'rgba(255,255,255,0.6)'}}>Aggiungi alla schermata Home per accesso rapido</p>
        }
      </div>
      {type==='android'&&(
        <button onClick={onInstall}
          style={{background:'white',color:'var(--ink)',border:'none',borderRadius:8,
            padding:'8px 14px',fontSize:12,fontWeight:700,flexShrink:0,cursor:'pointer'}}>
          Installa
        </button>
      )}
      <button onClick={onDismiss}
        style={{background:'none',border:'none',color:'rgba(255,255,255,0.4)',
          fontSize:18,cursor:'pointer',padding:'0 0 0 4px',flexShrink:0,lineHeight:1}}>✕</button>
    </div>
  );
}

// ── ROOT APP ─────────────────────────────────────────────────────
function App() {
  const [authUser, setAuthUser]   = useState(null);
  const [profile, setProfile]     = useState(null);
  const [loading, setLoading]     = useState(true);
  const [dataLoading, setDataLoad]= useState(false);
  const [tab, setTab]             = useState('home');
  const [staff, setStaff]         = useState([]);
  const [services, setServices]   = useState([]);
  const [bookings, setBookings]   = useState([]);
  const [schedules, setSchedules] = useState({});
  const [dayBlocks, setDayBlocks] = useState({});
  const [dayOverrides, setDayOverrides] = useState({});
  const [toast, setToast]         = useState(null);
  const [installPrompt, setInstallPrompt] = useState(null);
  const [showInstall, setShowInstall]     = useState(null); // null | 'android' | 'ios'

  // Gestione install banner PWA
  useEffect(() => {
    // Già installata come PWA → non mostrare
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) return;
    // Dismissione recente (7 giorni) → non mostrare
    const dismissed = localStorage.getItem('installDismissed');
    if (dismissed && Date.now() - parseInt(dismissed) < 7*24*60*60*1000) return;

    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isSafari = /safari/i.test(navigator.userAgent) && !/crios|fxios|chrome/i.test(navigator.userAgent);

    if (isIOS && isSafari) {
      setTimeout(() => setShowInstall('ios'), 4000);
      return;
    }

    // Android / Chrome desktop
    const handler = (e) => {
      e.preventDefault();
      setInstallPrompt(e);
      setTimeout(() => setShowInstall('android'), 4000);
    };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  const handleInstall = async () => {
    if (!installPrompt) return;
    installPrompt.prompt();
    const { outcome } = await installPrompt.userChoice;
    setShowInstall(null);
    setInstallPrompt(null);
  };

  const handleDismissInstall = () => {
    setShowInstall(null);
    localStorage.setItem('installDismissed', String(Date.now()));
  };

  // Controlla sessione all'avvio
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) loadProfile(session.user);
      else setLoading(false);
    });

    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      if (session?.user) loadProfile(session.user);
      else { setAuthUser(null); setProfile(null); setLoading(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  const loadProfile = async (user) => {
    setAuthUser(user);
    const { data } = await supabase.from('profiles').select('*').eq('id', user.id).single();
    if (data) {
      data.email = user.email;
      setProfile(data);
    }
    setLoading(false);
  };

  useEffect(() => {
    if (profile) {
      setTab(profile.is_admin ? 'admin-dash' : 'home');
      loadAppData();
    }
  }, [profile?.id]);

  useEffect(() => {
    if (!profile?.is_admin) return;
    const channel = supabase
      .channel('bookings-live')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'bookings' }, () => {
        loadAppData();
      })
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, [profile?.id]);

  const loadAppData = async () => {
    setDataLoad(true);
    try {
      const today = toLocalDate(new Date());
      const [staffRes, svcRes, bkRes, schRes, blkRes, ovrRes] = await Promise.all([
        supabase.from('staff').select('*').eq('active', true).order('id'),
        supabase.from('services').select('*').eq('active', true).order('id'),
        profile?.is_admin
          ? supabase.from('bookings').select('*, profiles!left(name, phone)').order('date', {ascending:false}).order('time', {ascending:true})
          : supabase.from('bookings').select('*, staff(name, color, initials)').order('date', {ascending:false}).order('time', {ascending:true}),
        supabase.from('staff_schedules').select('*'),
        supabase.from('staff_day_blocks').select('*').gte('date', today).order('date'),
        supabase.from('staff_day_overrides').select('*').gte('date', today).order('date'),
      ]);

      if (staffRes.data) setStaff(staffRes.data);
      if (svcRes.data)   setServices(svcRes.data);
      if (bkRes.data)    setBookings(bkRes.data);
      if (schRes.data) {
        const schMap = {};
        schRes.data.forEach(s => {
          schMap[s.staff_id] = s.weekly_config || {...DEFAULT_WEEKLY_CONFIG};
        });
        setSchedules(schMap);
      }
      if (blkRes.data) {
        const blkMap = {};
        blkRes.data.forEach(b => {
          if (!blkMap[b.staff_id]) blkMap[b.staff_id] = [];
          blkMap[b.staff_id].push(b);
        });
        setDayBlocks(blkMap);
      }
      if (ovrRes?.data) {
        const ovrMap = {};
        ovrRes.data.forEach(o => {
          if (!ovrMap[o.staff_id]) ovrMap[o.staff_id] = [];
          ovrMap[o.staff_id].push(o);
        });
        setDayOverrides(ovrMap);
      }
    } catch(e) {
      console.error('loadAppData error:', e);
    }
    setDataLoad(false);
  };

  const handleLogin  = (user) => setAuthUser(user);
  const handleLogout = () => { setAuthUser(null); setProfile(null); setStaff([]); setServices([]); setBookings([]); };

  if (loading) return <LoadingScreen />;
  if (!profile) return (
    <div style={{position:'relative',flex:1,display:'flex',flexDirection:'column'}}>
      <AuthScreen onLogin={handleLogin} />
    </div>
  );

  if (dataLoading && !staff.length) return <LoadingScreen />;

  const isAdmin = profile.is_admin;

  const screens = isAdmin ? {
    'admin-dash':    <AdminDash    bookings={bookings} onRefresh={loadAppData} setToast={setToast} staff={staff} services={services} schedules={schedules} dayBlocks={dayBlocks} dayOverrides={dayOverrides} profile={profile} />,
    'admin-cal':     <AdminCalendar bookings={bookings} onRefresh={loadAppData} setToast={setToast} staff={staff} services={services} schedules={schedules} dayBlocks={dayBlocks} dayOverrides={dayOverrides} />,
    'admin-staff':   <AdminStaff   bookings={bookings} schedules={schedules} setSchedules={setSchedules} dayBlocks={dayBlocks} setDayBlocks={setDayBlocks} dayOverrides={dayOverrides} setDayOverrides={setDayOverrides} setToast={setToast} staff={staff} setStaff={setStaff} services={services} setServices={setServices} />,
    'admin-history': <AdminHistory bookings={bookings} staff={staff} />,
    'admin-account': <AdminAccount profile={profile} onLogout={handleLogout} />,
  } : {
    'home':     <UserHome     user={authUser} profile={profile} bookings={bookings} setTab={setTab} staff={staff} services={services} />,
    'booking':  <BookingFlow  profile={profile} bookings={bookings} onBooked={loadAppData} setToast={setToast} staff={staff} services={services} setTab={setTab} schedules={schedules} dayBlocks={dayBlocks} dayOverrides={dayOverrides} />,
    'calendar': <UserCalendar profile={profile} bookings={bookings} onRefresh={loadAppData} setToast={setToast} staff={staff} />,
    'profile':  <UserProfile  profile={profile} bookings={bookings} onLogout={handleLogout} />,
  };

  return (
    <div style={{position:'relative',flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        {Object.entries(screens).map(([key, screen]) => (
          <div key={key} style={{
            position:'absolute', inset:0,
            transition:'opacity 0.25s, transform 0.25s cubic-bezier(.4,0,.2,1)',
            opacity:tab===key?1:0,
            transform:tab===key?'none':'translateY(8px)',
            pointerEvents:tab===key?'auto':'none',
            zIndex:tab===key?1:0,
          }}>
            {screen}
          </div>
        ))}
      </div>
      <BottomNav tab={tab} setTab={setTab} isAdmin={isAdmin} onRefresh={loadAppData} />
      {showInstall && <InstallBanner type={showInstall} onInstall={handleInstall} onDismiss={handleDismissInstall} />}
      {toast && <Toast message={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

function ConfigScreen() {
  return (
    <div style={{minHeight:'100dvh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,background:'var(--bg)',textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:20}}>✂️</div>
      <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:700,color:'var(--ink)',marginBottom:8}}>Hair Studios</h1>
      <p style={{fontSize:15,color:'var(--ink2)',marginBottom:32,lineHeight:1.6}}>Per avviare l'app devi configurare<br/>le credenziali Supabase.</p>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:24,maxWidth:400,width:'100%',textAlign:'left'}}>
        <p style={{fontSize:12,fontWeight:600,color:'var(--ink2)',textTransform:'uppercase',letterSpacing:0.5,marginBottom:16}}>Come fare</p>
        {[
          ['1','Vai su supabase.com e crea un progetto'],
          ['2','SQL Editor → incolla schema.sql → Run'],
          ['3','Settings → API → copia URL e anon key'],
          ['4','Apri index.html e sostituisci le due stringhe INSERISCI_...'],
        ].map(([n,t])=>(
          <div key={n} style={{display:'flex',gap:12,marginBottom:14,alignItems:'flex-start'}}>
            <span style={{minWidth:24,height:24,borderRadius:'50%',background:'var(--ink)',color:'white',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{n}</span>
            <p style={{fontSize:13,color:'var(--ink)',lineHeight:1.5,marginTop:2}}>{t}</p>
          </div>
        ))}
      </div>
      <p style={{marginTop:24,fontSize:12,color:'var(--ink3)'}}>Dopo aver salvato, ricarica questa pagina.</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  CONFIG_READY ? <App /> : <ConfigScreen />
);
</script>
</body>
</html>
