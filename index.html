// Verifica se uno slot è disponibile rispettando orario settimanale, pause fisse e blocchi extra
function checkSlot(date, time, staffId, duration, bookings, schedules, dayBlocks, dayOverrides) {
  if (!date || !time || !staffId || !duration) return false;
  const t2m = t => { if (!t) return NaN; const [h,m]=(t+'').split(':').map(Number); return h*60+m; };

  // 1. Se esiste un override per questa data, usalo (sovrascrive l'orario settimanale)
  const override = (dayOverrides?.[staffId] || []).find(o => o.date === date);
  let cfg;
  if (override) {
    if (!override.start_time || !override.end_time) return false; // giorno chiuso
    cfg = {
      start:  override.start_time.slice(0,5),
      end:    override.end_time.slice(0,5),
      breaks: (override.breaks||[]).map(b=>({start:(b.start||'').slice(0,5), end:(b.end||'').slice(0,5)})),
    };
  } else {
    const dow = new Date(date + 'T12:00:00').getDay();
    cfg = (schedules[staffId]||{})[dow];
    if (!cfg) return false;
  }

  const ss = t2m(time), se = ss + duration;
  if (isNaN(ss) || isNaN(se)) return false;
  if (ss < t2m(cfg.start) || se > t2m(cfg.end)) return false;
  for (const b of cfg.breaks||[]) if (ss < t2m(b.end) && se > t2m(b.start)) return false;
  for (const b of (dayBlocks[staffId]||[]).filter(b=>b.date===date)) {
    if (!b.start_time || !b.end_time) continue;
    if (ss < t2m(b.end_time.slice(0,5)) && se > t2m(b.start_time.slice(0,5))) return false;
  }
  return !bookings.some(b => {
    if (b.staff_id!==staffId||b.date!==date||b.status==='cancelled') return false;
    if (!b.time || !b.service_duration) return false;
    const bs=t2m(b.time.slice(0,5)), be=bs+b.service_duration;
    return ss<be && se>bs;
  });
}

const getWeekDates = (offset = 0) => {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  return Array.from({length:7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
};

// Calcola il weekOffset per il primo lunedì di un dato mese/anno
const offsetForMonthYear = (year, month) => {
  const target = new Date(year, month, 1);
  const dow = target.getDay();
  const monday = new Date(target);
  monday.setDate(target.getDate() - (dow === 0 ? 6 : dow - 1));
  const now = new Date(); now.setHours(0,0,0,0);
  const todayDow = now.getDay();
  const todayMon = new Date(now);
  todayMon.setDate(now.getDate() - (todayDow === 0 ? 6 : todayDow - 1));
  return Math.round((monday - todayMon) / 604800000);
};

function MonthYearPicker({ weekDates, setWeekOffset, onClose, onSelect, allowPast }) {

  const nowYear  = new Date().getFullYear();
  const nowMonth = new Date().getMonth();
  const select = (m) => {
    setWeekOffset(offsetForMonthYear(pickerYear, m));
    if (onSelect) onSelect();
    onClose();
  };
  return (

      <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:49}} />
      <div style={{position:'absolute',top:'calc(100% + 6px)',left:'50%',transform:'translateX(-50%)',

            return (

function AuthScreen({ onLogin }) {
  const [mode,     setMode]    = useState('login');

  const [name,     setName]    = useState('');

  const [busy,     setBusy]    = useState(false);
  const [showPass, setShowPass]= useState(false);

  const handle = async () => {
    if (!email || !pass) { setErr('Compila tutti i campi'); return; }
    setBusy(true); setErr('');
    try {
      if (mode === 'login') {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

        onLogin(data.user);
      } else {
        if (!name.trim()) { setErr('Inserisci il tuo nome'); setBusy(false); return; }

          email, password: pass,
          options: { data: { name: name.trim(), phone: phone.trim() } },
        });
        if (error) throw error;
        if (data.user) onLogin(data.user);
        else setErr('Controlla la tua email per confermare la registrazione.');

      setErr(e.message || 'Errore. Riprova.');

        <div className="input-group">
          <label className="input-label">Email</label>
          <input className="input-field" type="email" placeholder="nome@email.com" value={email} onChange={e=>setEmail(e.target.value)} />
        </div>
        <div className="input-group">
          <label className="input-label">Password</label>
          <div style={{position:'relative'}}>
            <input className="input-field" type={showPass?'text':'password'} placeholder="••••••••" value={pass}
              onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handle()}
              style={{paddingRight:44}} />
            <button type="button" onClick={()=>setShowPass(v=>!v)}
              style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',
                background:'none',border:'none',cursor:'pointer',color:'var(--ink3)',fontSize:16,lineHeight:1,padding:4}}>
              {showPass?'🙈':'👁'}
            </button>
          </div>
        </div>
        {err && <p style={{fontSize:12,color:'oklch(45% 0.18 25)',fontWeight:500}}>{err}</p>}
      </div>

      <button className="btn-primary" style={{marginTop:24,opacity:busy?0.6:1}} disabled={busy} onClick={handle}>
        {busy ? 'Attendere...' : mode==='login' ? 'Accedi' : 'Crea Account'}
      </button>
    </div>
  );
}

// ── BOOKING FLOW ────────────────────────────────────────────────
function BookingFlow({ profile, bookings, onBooked, setToast, staff, services, setTab, schedules, dayBlocks, dayOverrides }) {
  const [step, setStep]                   = useState(0);
  const [selectedServices, setSel]        = useState([]);
  const [selectedStaff, setSelectedStaff] = useState(null);
  const [date, setDate]                   = useState(null);
  const [time, setTime]                   = useState(null);
  const [weekOffset, setWeekOffset]       = useState(0);
  const [selectedDay, setSelectedDay]     = useState(0);
  const [showPicker, setShowPicker]       = useState(false);
  const [busy, setBusy]                   = useState(false);
  const [bookingNotes, setBookingNotes]   = useState('');
  const weekDates = getWeekDates(weekOffset);
  const totalDuration = selectedServices.reduce((a,s)=>a+s.duration,0);

  const toggleService = (s) => {
    setSel(prev => prev.find(p=>p.id===s.id) ? prev.filter(p=>p.id!==s.id) : [...prev,s]);
    setTime(null); setDate(null);
  };

  const ALL_SLOTS = [];
  for(let h=8;h<20;h++){
    ALL_SLOTS.push(`${String(h).padStart(2,'0')}:00`);
    ALL_SLOTS.push(`${String(h).padStart(2,'0')}:30`);
  }

  const confirm = async () => {
    if (!selectedStaff||!date||!time||!selectedServices.length) return;
    setBusy(true);
    const combinedName = selectedServices.map(s=>s.name).join(' + ');
    const { error } = await supabase.from('bookings').insert({
      user_id:          profile.id,
      staff_id:         selectedStaff.id,
      service_id:       selectedServices.length===1 ? selectedServices[0].id : null,
      service_name:     combinedName,
      service_duration: totalDuration,
      client_name:      profile.name,
      date, time,
      status: 'pending',
      notes: bookingNotes || null,
    });
    setBusy(false);
    if (error) { setToast('Errore: ' + error.message); return; }
    setToast('✓ Prenotazione inviata!');
    setStep(0); setSel([]); setSelectedStaff(null); setDate(null); setTime(null);
    onBooked();
    setTab('home');
  };

  const steps = ['Servizi','Barbiere','Data & Ora','Conferma'];
  return (
    <div className="screen">
      <div style={{padding:'env(safe-area-inset-top, 16px) 24px 0',flexShrink:0,paddingTop:16}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
          {step>0 && <button className="btn-icon" onClick={() => setStep(s=>s-1)}>←</button>}
          <div style={{flex:1}}>
            <h2 style={{fontSize:20,fontWeight:700,color:'var(--ink)',letterSpacing:-0.3}}>{steps[step]}</h2>
            {step===0&&selectedServices.length>0&&(
              <p style={{fontSize:11,color:'var(--gold)',fontWeight:600,marginTop:2}}>{selectedServices.length} selezionati · {totalDuration} min</p>
            )}
          </div>
        </div>
        <div className="step-indicator" style={{marginBottom:16}}>
          {steps.map((_,i)=><div key={i} className={`step-dot ${i===step?'active':i<step?'done':''}`}></div>)}
        </div>
      </div>

      <div className="scroll-content" style={{padding:'0 24px 24px'}}>
        {/* STEP 0: Servizi */}
        {step===0 && (
          <>
            <p style={{fontSize:12,color:'var(--ink3)',marginBottom:14}}>Seleziona uno o più servizi</p>
            <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
              {services.map(s => {
                const isSel = selectedServices.find(p=>p.id===s.id);
                return (
                  <button key={s.id} onClick={()=>toggleService(s)}
                    style={{display:'flex',alignItems:'center',gap:14,padding:'16px 18px',
                      background:isSel?'var(--ink)':'var(--bg)',borderRadius:'var(--radius-sm)',
                      border:'1.5px solid',borderColor:isSel?'var(--ink)':'var(--border)',
                      textAlign:'left',transition:'all 0.15s',width:'100%'}}>
                    <div style={{width:22,height:22,borderRadius:6,border:'2px solid',
                      borderColor:isSel?'var(--gold)':'rgba(0,0,0,0.2)',
                      background:isSel?'var(--gold)':'transparent',
                      display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      {isSel&&<span style={{color:'white',fontSize:13,fontWeight:700}}>✓</span>}
                    </div>
                    <div style={{flex:1}}>
                      <p style={{fontSize:15,fontWeight:600,fontFamily:"'Cormorant Garamond',serif",color:isSel?'white':'var(--ink)'}}>{s.name}</p>
                      <p style={{fontSize:12,color:isSel?'rgba(255,255,255,0.55)':'var(--ink3)',marginTop:2}}>{s.duration} min{s.price?` · €${Number(s.price).toFixed(2)}`:''}</p>
                    </div>
                  </button>
                );
              })}
            </div>
            {selectedServices.length>0&&(
              <div style={{background:'var(--gold-bg)',border:'1px solid var(--gold-dim)',borderRadius:'var(--radius-sm)',padding:'12px 16px',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <p style={{fontSize:11,fontWeight:600,color:'var(--gold)',textTransform:'uppercase',letterSpacing:0.4}}>Durata totale</p>
                  <p style={{fontSize:18,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)',marginTop:2}}>{totalDuration} min</p>
                </div>
              </div>
            )}
            <button className="btn-primary" style={{opacity:selectedServices.length?1:0.4}} disabled={!selectedServices.length} onClick={()=>setStep(1)}>Continua →</button>
          </>
        )}

        {/* STEP 1: Barbiere */}
        {step===1 && (
          <>
            <p style={{fontSize:12,color:'var(--ink3)',marginBottom:14}}>Scegli il tuo barbiere</p>
            <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:24}}>
              {staff.map(s => (
                <button key={s.id} onClick={()=>{setSelectedStaff(s);setTime(null);setDate(null);}}
                  style={{display:'flex',alignItems:'center',gap:16,padding:'18px',borderRadius:'var(--radius)',
                    background:selectedStaff?.id===s.id?'var(--ink)':'var(--bg)',
                    border:'1.5px solid',borderColor:selectedStaff?.id===s.id?'var(--ink)':'var(--border)',
                    textAlign:'left',transition:'all 0.15s',width:'100%'}}>
                  <div className="avatar" style={{width:52,height:52,fontSize:18,background:s.color,color:'white',fontWeight:700}}>{s.initials}</div>
                  <div style={{flex:1}}>
                    <p style={{fontSize:16,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:selectedStaff?.id===s.id?'white':'var(--ink)'}}>{s.name}</p>
                    <p style={{fontSize:12,color:selectedStaff?.id===s.id?'rgba(255,255,255,0.6)':'var(--ink3)',marginTop:2}}>{s.role}</p>
                  </div>
                  {selectedStaff?.id===s.id&&<span style={{color:'var(--gold)',fontSize:20}}>✓</span>}
                </button>
              ))}
            </div>
            <button className="btn-primary" style={{opacity:selectedStaff?1:0.4}} disabled={!selectedStaff} onClick={()=>setStep(2)}>Continua →</button>
          </>
        )}

        {/* STEP 2: Data & Ora */}
        {step===2&&selectedStaff&&(
          <>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <button className="btn-icon" onClick={()=>{setWeekOffset(o=>Math.max(0,o-1));setTime(null);setDate(null);}} style={{opacity:weekOffset===0?0.3:1}}>‹</button>
              <div style={{position:'relative'}}>
                <button onClick={()=>setShowPicker(p=>!p)}
                  style={{fontSize:13,fontWeight:600,color:'var(--ink)',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'5px 12px',cursor:'pointer'}}>
                  {MONTHS[weekDates[0].getMonth()]} {weekDates[0].getFullYear()} ▾
                </button>
                {showPicker && <MonthYearPicker weekDates={weekDates} setWeekOffset={setWeekOffset} onClose={()=>setShowPicker(false)} onSelect={()=>{setTime(null);setDate(null);}} />}
              </div>
              <button className="btn-icon" onClick={()=>{setWeekOffset(o=>o+1);setTime(null);setDate(null);}}>›</button>
            </div>
            <div style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
              {weekDates.map((d,i) => {
                const today = new Date(); today.setHours(0,0,0,0);
                const isPast = d < today;
                const dow = d.getDay();
                const isClosed = selectedStaff && !(schedules[selectedStaff.id]||{})[dow];
                const disabled = isPast || isClosed;
                const isSel = selectedDay===i && !disabled;
                const isToday = d.toDateString()===new Date().toDateString();
                return (
                  <button key={i} disabled={disabled}
                    onClick={()=>{ if(!disabled){setSelectedDay(i);setTime(null);setDate(null);}}}
                    style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'10px 12px',
                      borderRadius:12,border:'1.5px solid',flexShrink:0,minWidth:46,
                      borderColor:isSel?'var(--ink)':isToday&&!disabled?'var(--gold-dim)':'var(--border)',
                      background:isSel?'var(--ink)':isToday&&!disabled?'var(--gold-bg)':'var(--bg)',
                      opacity:disabled?0.3:1,cursor:disabled?'not-allowed':'pointer',transition:'all 0.15s'}}>
                    <span style={{fontSize:10,fontWeight:600,color:isSel?'rgba(255,255,255,0.6)':isToday&&!disabled?'var(--gold)':'var(--ink3)',textTransform:'uppercase',letterSpacing:0.3}}>{DAYS_SHORT[i]}</span>
                    <span style={{fontSize:18,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:isSel?'white':'var(--ink)'}}>{d.getDate()}</span>
                  </button>
                );
              })}
            </div>
            <p style={{fontSize:12,fontWeight:600,color:'var(--ink2)',marginBottom:10,textTransform:'uppercase',letterSpacing:0.5}}>Orari disponibili</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:24}}>
              {ALL_SLOTS.map(h => {
                const dStr=toLocalDate(weekDates[selectedDay]);
                const now=new Date();
                const isToday=weekDates[selectedDay].toDateString()===now.toDateString();
                const [hh,mm]=h.split(':').map(Number);
                const isPastTime=isToday&&(hh*60+mm)<=(now.getHours()*60+now.getMinutes());
                const avail=!isPastTime&&checkSlot(dStr,h,selectedStaff.id,totalDuration,bookings,schedules,dayBlocks,dayOverrides);
                const isSel=time===h&&date===dStr;
                return (
                  <button key={h} disabled={!avail} onClick={()=>{setTime(h);setDate(dStr);}}
                    style={{padding:'12px 8px',borderRadius:10,border:'1.5px solid',textAlign:'center',
                      fontSize:15,fontWeight:600,fontFamily:"'Cormorant Garamond',serif",
                      background:isSel?'var(--ink)':avail?'oklch(93% 0.07 145)':'oklch(94% 0.04 15)',
                      color:isSel?'white':avail?'oklch(32% 0.14 145)':'oklch(45% 0.1 15)',
                      borderColor:isSel?'var(--ink)':avail?'oklch(76% 0.11 145)':'oklch(82% 0.07 15)',
                      cursor:!avail?'not-allowed':'pointer',transition:'all 0.15s'}}>
                    {h}
                  </button>
                );
              })}
            </div>
            {date&&time&&<button className="btn-primary" onClick={()=>setStep(3)}>Continua →</button>}
          </>
        )}

        {/* STEP 3: Conferma */}
        {step===3&&selectedServices.length>0&&selectedStaff&&date&&time&&(
          <div style={{paddingBottom:24}}>
            <div className="card-dark" style={{marginBottom:20}}>
              <p style={{fontSize:11,color:'rgba(255,255,255,0.5)',fontWeight:600,letterSpacing:0.5,textTransform:'uppercase',marginBottom:12}}>Riepilogo</p>
              {selectedServices.map((s,i)=>(
                <div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                  paddingBottom:i<selectedServices.length-1?8:0,marginBottom:i<selectedServices.length-1?8:0,
                  borderBottom:i<selectedServices.length-1?'1px solid rgba(255,255,255,0.08)':'none'}}>
                  <span style={{fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'white'}}>{s.name}</span>
                  <span style={{fontSize:12,color:'rgba(255,255,255,0.5)'}}>{s.duration} min</span>
                </div>
              ))}
              <div style={{height:1,background:'rgba(255,255,255,0.1)',margin:'16px 0'}}></div>
              {[
                ['Barbiere', selectedStaff.name],
                ['Data',     new Date(date).toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'})],
                ['Orario',   time],
                ['Durata',   `${totalDuration} min`],
              ].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <span style={{fontSize:12,color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:0.4,fontWeight:600}}>{k}</span>
                  <span style={{fontSize:14,fontWeight:600,color:'white'}}>{v}</span>
                </div>
              ))}
            </div>
            <textarea
              value={bookingNotes} onChange={e=>setBookingNotes(e.target.value)}
              placeholder="Note per il barbiere (facoltativo) — allergie, richieste speciali…"
              rows={3}
              style={{width:'100%',background:'var(--bg2)',border:'1.5px solid var(--border)',borderRadius:'var(--radius-sm)',
                padding:'12px 14px',fontSize:14,color:'var(--ink)',fontFamily:"'Jost',sans-serif",
                resize:'none',outline:'none',marginBottom:16,lineHeight:1.5}}
            />
            <p style={{fontSize:12,color:'var(--ink3)',textAlign:'center',marginBottom:20}}>La prenotazione sarà confermata dal barbiere entro 24h</p>
            <button className="btn-gold" style={{opacity:busy?0.6:1}} disabled={busy} onClick={confirm}>
              {busy?'Invio...':'Conferma Prenotazione'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── USER CALENDAR ───────────────────────────────────────────────
function UserCalendar({ profile, bookings, onRefresh, setToast, staff }) {
  const [weekOffset, setWeekOffset] = useState(0);
  const [selectedDay, setSelectedDay] = useState(null);
  const [showPicker, setShowPicker] = useState(false);
  const weekDates = getWeekDates(weekOffset);

  const myBookings = bookings.filter(b => b.user_id===profile.id);
  const dayBookings = selectedDay!==null
    ? myBookings.filter(b=>b.date===toLocalDate(weekDates[selectedDay]))
    : myBookings;

  const cancel = async (id) => {
    const { error } = await supabase.from('bookings').update({ status:'cancelled' }).eq('id',id);
    if (error) { setToast('Errore: '+error.message); return; }
    setToast('Prenotazione annullata');
    onRefresh();
  };

  return (
    <div className="screen">
      <div style={{padding:'env(safe-area-inset-top,16px) 24px 0',flexShrink:0,paddingTop:16}}>
        <h2 style={{fontSize:22,fontWeight:700,color:'var(--ink)',marginBottom:16,letterSpacing:-0.3}}>Le mie prenotazioni</h2>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <button className="btn-icon" onClick={()=>setWeekOffset(o=>Math.max(0,o-1))} style={{opacity:weekOffset===0?0.3:1}}>‹</button>
          <div style={{position:'relative'}}>
            <button onClick={()=>setShowPicker(p=>!p)}
              style={{fontSize:13,fontWeight:600,color:'var(--ink)',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'5px 12px',cursor:'pointer'}}>
              {MONTHS[weekDates[0].getMonth()]} {weekDates[0].getFullYear()} ▾
            </button>
            {showPicker && <MonthYearPicker weekDates={weekDates} setWeekOffset={setWeekOffset} onClose={()=>setShowPicker(false)} />}
          </div>
          <button className="btn-icon" onClick={()=>setWeekOffset(o=>o+1)}>›</button>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:2}}>
          <button onClick={()=>setSelectedDay(null)}
            style={{padding:'6px 14px',borderRadius:99,fontSize:12,fontWeight:600,border:'1.5px solid',flexShrink:0,
              background:selectedDay===null?'var(--ink)':'var(--bg)',color:selectedDay===null?'white':'var(--ink3)',borderColor:selectedDay===null?'var(--ink)':'var(--border)'}}>
            Tutti
          </button>
          {weekDates.map((d,i)=>{
            const hasB=myBookings.some(b=>b.date===toLocalDate(d)&&b.status!=='cancelled');
            return(
              <button key={i} onClick={()=>setSelectedDay(selectedDay===i?null:i)}
                style={{padding:'6px 14px',borderRadius:99,fontSize:12,fontWeight:600,border:'1.5px solid',flexShrink:0,position:'relative',
                  background:selectedDay===i?'var(--ink)':'var(--bg)',color:selectedDay===i?'white':'var(--ink)',borderColor:selectedDay===i?'var(--ink)':'var(--border)'}}>
                {DAYS_SHORT[i]} {d.getDate()}
                {hasB&&<span style={{position:'absolute',top:2,right:2,width:6,height:6,borderRadius:'50%',background:'var(--gold)'}}></span>}
              </button>
            );
          })}
        </div>
      </div>
      <div className="scroll-content" style={{padding:'0 24px 24px'}}>
        {dayBookings.filter(b=>b.status!=='cancelled').length===0&&(
          <div style={{textAlign:'center',padding:'40px 0'}}>
            <p style={{fontSize:32,marginBottom:8}}>📅</p>
            <p style={{fontSize:14,color:'var(--ink3)'}}>Nessuna prenotazione</p>
          </div>
        )}
        {dayBookings.filter(b=>b.status!=='cancelled').map(b=>{
          const s=staff.find(st=>st.id===b.staff_id);
          return(
            <div key={b.id} className="card" style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <div>
                  <p style={{fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)'}}>{b.service_name}</p>
                  <p style={{fontSize:12,color:'var(--ink3)',marginTop:2}}>{new Date(b.date).toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'long'})}</p>
                  <p style={{fontSize:17,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)',marginTop:2}}>{b.time?.slice(0,5)}</p>
                </div>
                <span className={`badge ${b.status==='confirmed'?'badge-green':'badge-gold'}`}>
                  {b.status==='confirmed'?'✓ Confermata':'◌ In attesa'}
                </span>
              </div>
              {s&&(
                <div style={{display:'flex',alignItems:'center',gap:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>
                  <div className="avatar" style={{width:32,height:32,fontSize:11,background:s.color,color:'white',fontWeight:700}}>{s.initials}</div>
                  <div style={{flex:1}}>
                    <p style={{fontSize:13,fontWeight:600,color:'var(--ink)'}}>{s.name}</p>
                    <p style={{fontSize:11,color:'var(--ink3)'}}>{b.service_duration} min</p>
                  </div>
                  {b.status==='pending'&&(
                    <button onClick={()=>cancel(b.id)}
                      style={{fontSize:11,fontWeight:600,padding:'6px 12px',borderRadius:8,border:'1px solid',
                        color:'oklch(45% 0.18 25)',borderColor:'oklch(90% 0.04 20)',background:'oklch(98% 0.02 20)'}}>
                      Annulla
                    </button>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function BookingActionModal({ booking, bookings, onSave, onClose, staff, services, schedules, dayBlocks, dayOverrides }) {
  const [mode, setMode]         = useState('menu');
  const [weekOffset, setWeekOffset] = useState(0);
  const [selectedDay, setSelectedDay] = useState(0);
  const [showPicker, setShowPicker] = useState(false);
  const [newTime, setNewTime]   = useState(null);
  const [newStaff, setNewStaff] = useState(booking.staff_id);
  const [busy, setBusy]         = useState(false);
  const [editName, setEditName]           = useState(booking.client_name || '');
  const [editServiceName, setEditServiceName] = useState(booking.service_name || '');
  const [editDuration, setEditDuration]   = useState(booking.service_duration || 30);
  const [editStatus, setEditStatus]       = useState(booking.status || 'pending');
  const [editNotes, setEditNotes]         = useState(booking.notes || '');
  const [editEarnings, setEditEarnings]   = useState(booking.earnings != null ? String(booking.earnings) : '');
  const weekDates = getWeekDates(weekOffset);

  const confirmReschedule = async () => {
    const dateStr=toLocalDate(weekDates[selectedDay]);
    if (!newTime) return;
    setBusy(true);
    const { error } = await supabase.from('bookings').update({ date:dateStr, time:newTime, staff_id:newStaff, status:'confirmed' }).eq('id',booking.id);
    setBusy(false);
    if (error) return;
    onSave();
  };

  const cancelBooking = async () => {
    setBusy(true);
    await supabase.from('bookings').update({ status:'cancelled' }).eq('id',booking.id);
    setBusy(false);
    onSave();
  };

  const saveEdit = async () => {
    setBusy(true);
    await supabase.from('bookings').update({
      client_name: editName,
      service_name: editServiceName,
      service_duration: editDuration,
      status: editStatus,
      notes: editNotes || null,
      earnings: editEarnings !== '' ? parseFloat(editEarnings) : null,

    setBusy(false);
    onSave();

  const bookingStaff = staff.find(s=>s.id===booking.staff_id);
  const HOURS = [];

    <div style={{position:'absolute',inset:0,zIndex:100,display:'flex',flexDirection:'column',justifyContent:'flex-end',background:'rgba(0,0,0,0.4)'}}>

        <div style={{width:36,height:4,borderRadius:2,background:'var(--border)',margin:'0 auto 20px'}}></div>

        {mode==='menu'&&(
          <>
            <div style={{background:'var(--bg2)',borderRadius:'var(--radius-sm)',padding:'14px 16px',marginBottom:20,border:'1px solid var(--border)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <p style={{fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)',marginBottom:2}}>{booking.client_name}</p>
                <button onClick={()=>setMode('edit')} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,padding:'0 0 0 8px',color:'var(--ink3)',lineHeight:1}} title="Modifica note">✏️</button>
              </div>
              {(booking.profiles?.phone||booking.client_phone)&&(()=>{
                const tel=booking.profiles?.phone||booking.client_phone;
                return <a href={`tel:${tel.replace(/\s/g,'')}`} style={{fontSize:12,color:'var(--gold)',fontWeight:700,marginBottom:4,display:'inline-flex',alignItems:'center',gap:4,textDecoration:'none'}}>📞 {tel}</a>;
              })()}
              <p style={{fontSize:12,color:'var(--ink3)'}}>{booking.service_name} · {booking.time?.slice(0,5)} · {new Date(booking.date).toLocaleDateString('it-IT',{day:'numeric',month:'long'})}</p>
              {bookingStaff&&<p style={{fontSize:12,color:'var(--ink3)',marginTop:2}}>con {bookingStaff.name}</p>}
              {(booking.notes||editNotes)&&<p style={{fontSize:12,color:'var(--ink2)',marginTop:6,fontStyle:'italic'}}>📝 {editNotes||booking.notes}</p>}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <button onClick={()=>setMode('reschedule')}
                style={{display:'flex',alignItems:'center',gap:14,padding:16,borderRadius:'var(--radius-sm)',background:'var(--bg2)',border:'1px solid var(--border)',textAlign:'left',width:'100%'}}>
                <div style={{width:40,height:40,borderRadius:12,background:'var(--ink)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{color:'white',fontSize:18}}>↕</span>
                </div>
                <div>
                  <p style={{fontSize:14,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)'}}>Sposta appuntamento</p>
                  <p style={{fontSize:11,color:'var(--ink3)',marginTop:1}}>Cambia data, orario o barbiere</p>
                </div>
              </button>
              <button onClick={cancelBooking} disabled={busy}
                style={{display:'flex',alignItems:'center',gap:14,padding:16,borderRadius:'var(--radius-sm)',background:'oklch(98% 0.02 20)',border:'1px solid oklch(90% 0.04 20)',textAlign:'left',width:'100%'}}>
                <div style={{width:40,height:40,borderRadius:12,background:'oklch(45% 0.18 25)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{color:'white',fontSize:18}}>✕</span>
                </div>
                <div>
                  <p style={{fontSize:14,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'oklch(35% 0.18 25)'}}>Annulla appuntamento</p>
                </div>
              </button>
            </div>
            <button className="btn-secondary" style={{marginTop:16}} onClick={onClose}>Chiudi</button>
          </>
        )}

        {mode==='edit'&&(
          <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,flexShrink:0}}>
              <button className="btn-icon" onClick={()=>setMode('menu')}>←</button>
              <h3 style={{fontSize:17,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:'var(--ink)'}}>Modifica appuntamento</h3>
            </div>
            <div style={{overflowY:'auto',flex:1,display:'flex',flexDirection:'column',gap:12}}>
              {/* Nome cliente */}
              <div>
                <p style={{fontSize:11,fontWeight:600,color:'var(--ink3)',marginBottom:4,textTransform:'uppercase',letterSpacing:0.3}}>Nome cliente</p>
                <input value={editName} onChange={e=>setEditName(e.target.value)}
                  style={{width:'100%',background:'var(--bg2)',border:'1.5px solid var(--border)',borderRadius:'var(--radius-sm)',
                    padding:'10px 12px',fontSize:14,color:'var(--ink)',outline:'none',fontFamily:"'Jost',sans-serif"}} />
              </div>
              {/* Servizio */}
              <div>
                <p style={{fontSize:11,fontWeight:600,color:'var(--ink3)',marginBottom:4,textTransform:'uppercase',letterSpacing:0.3}}>Servizio</p>
                <select value={editServiceName}
                  onChange={e=>{
                    const svc=(services||[]).find(s=>s.name===e.target.value);
                    setEditServiceName(e.target.value);
                    if(svc) setEditDuration(svc.duration);
                  }}
                  style={{width:'100%',background:'var(--bg2)',border:'1.5px solid var(--border)',borderRadius:'var(--radius-sm)',
                    padding:'10px 12px',fontSize:14,color:'var(--ink)',outline:'none',fontFamily:"'Jost',sans-serif"}}>
                  {(services||[]).map(s=><option key={s.id} value={s.name}>{s.name} ({s.duration} min)</option>)}
                </select>
              </div>
              {/* Stato */}
              <div>
                <p style={{fontSize:11,fontWeight:600,color:'var(--ink3)',marginBottom:4,textTransform:'uppercase',letterSpacing:0.3}}>Stato</p>
                <select value={editStatus} onChange={e=>setEditStatus(e.target.value)}
                  style={{width:'100%',background:'var(--bg2)',border:'1.5px solid var(--border)',borderRadius:'var(--radius-sm)',
                    padding:'10px 12px',fontSize:14,color:'var(--ink)',outline:'none',fontFamily:"'Jost',sans-serif"}}>
                  <option value="pending">In attesa</option>
                  <option value="confirmed">Confermato</option>
                  <option value="cancelled">Annullato</option>
                </select>
              </div>
              {/* Guadagno */}
